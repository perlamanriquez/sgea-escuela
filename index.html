  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:${o.bg};color:${o.text}}

  /* \u2500\u2500 ANIMACIONES \u2500\u2500 */
  @keyframes fadeUp{from{opacity:0;translate:0 12px}to{opacity:1;translate:0 0}}
  @keyframes slideIn{from{opacity:0;translate:-12px 0}to{opacity:1;translate:0 0}}
  @keyframes toastAnim{0%{opacity:0;translate:-50% -8px}10%{opacity:1;translate:-50% 0}80%{opacity:1}100%{opacity:0;translate:-50% -8px}}

  .drawer-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(3px)}
  .drawer{background:linear-gradient(180deg,${o.p1} 0%,${o.p2} 100%);
    width:285px;height:100%;overflow-y:auto;display:flex;flex-direction:column}
  .dw-item{display:block;width:100%;background:transparent;color:#fff;border:none;
    border-left:3px solid transparent;padding:13px 22px;font-size:14px;
    text-align:left;cursor:pointer;transition:all .15s;font-family:inherit}
  .dw-item:hover{background:rgba(255,255,255,.1)}
  .dw-item.on{background:rgba(255,255,255,.15);border-left-color:#60a5fa;font-weight:700}
  .dw-sep{height:1px;background:rgba(255,255,255,.1);margin:8px 16px}

  /* \u2500\u2500 CARDS \u2500\u2500 */
  .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden}
  .card-pad{padding:18px}
  .stat-card{background:#fff;border-radius:12px;padding:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center;
    transition:transform .2s,box-shadow .2s;cursor:default}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}

  /* \u2500\u2500 BOTONES \u2500\u2500 */
  .btn{border:none;border-radius:9px;padding:9px 18px;font-weight:700;font-size:13px;
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:all .15s;white-space:nowrap;font-family:inherit;line-height:1.3}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn:active{transform:translateY(0);filter:brightness(.96)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
  .btn-p{background:${o.p3};color:#fff}
  .btn-dark{background:${o.p1};color:#fff}
  .btn-g{background:#22c55e;color:#fff}
  .btn-r{background:#ef4444;color:#fff}
  .btn-y{background:#f59e0b;color:#fff}
  .btn-v{background:${o.v1};color:#fff}
  .btn-gray{background:#e5e7eb;color:#374151}
  .btn-ghost{background:transparent;color:${o.p3};border:1.5px solid ${o.p3}}
  .btn-sm{padding:5px 12px;font-size:11.5px;border-radius:7px}
  .btn-xs{padding:3px 8px;font-size:10.5px;border-radius:6px}
  .btn-xl{padding:13px 28px;font-size:15px;border-radius:11px}

  /* \u2500\u2500 INPUTS \u2500\u2500 */
  .inp{width:100%;padding:10px 13px;border:1.5px solid #d1d5db;border-radius:9px;
    font-size:13.5px;outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;background:#fff}
  .inp:focus{border-color:${o.p3};box-shadow:0 0 0 3px ${o.p3}22}
  .inp-err{border-color:${o.d1}!important}
  .sel{padding:10px 13px;border:1.5px solid #d1d5db;border-radius:9px;
    font-size:13px;outline:none;cursor:pointer;background:#fff;font-family:inherit}
  .sel:focus{border-color:${o.p3}}
  .inp-group{display:flex;flex-direction:column;gap:4px}
  .inp-label{font-size:12px;font-weight:700;color:#374151}
  .inp-hint{font-size:11px;color:${o.muted}}
  .inp-err-msg{font-size:11px;color:${o.d1};font-weight:600}

  /* \u2500\u2500 TABLAS \u2500\u2500 */
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl th{padding:9px 10px;text-align:left;white-space:nowrap;
    background:${o.p1};color:#fff;font-size:12px;font-weight:600}
  .tbl td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr:hover td{background:#f8fafc}
  .tbl-alt tbody tr:nth-child(even) td{background:#f8fafc}
  .tbl-total td{background:${o.p1}18!important;font-weight:800;color:${o.p1}}

  /* \u2500\u2500 CHIPS / BADGES \u2500\u2500 */
  .chip{display:inline-block;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;line-height:1.4}
  .chip-b{background:#dbeafe;color:#1e40af}
  .chip-g{background:#dcfce7;color:#166534}
  .chip-r{background:#fee2e2;color:#991b1b}
  .chip-y{background:#fef3c7;color:#92400e}
  .chip-v{background:#ede9fe;color:#5b21b6}
  .chip-u{background:#fce7f3;color:#9d174d;border:1px solid #fbcfe8}
  .chip-gray{background:#f1f5f9;color:#475569}

  /* \u2500\u2500 TOAST \u2500\u2500 */
  .toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9999;
    padding:11px 22px;border-radius:12px;font-weight:700;font-size:13.5px;
    box-shadow:0 8px 28px rgba(0,0,0,.28);animation:toastAnim 3.5s ease forwards;
    white-space:nowrap;max-width:92vw;pointer-events:none}

  /* \u2500\u2500 MODAL \u2500\u2500 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:500;padding:12px}
  .modal{background:#fff;border-radius:18px;padding:26px;width:100%;
    max-height:92vh;overflow-y:auto;box-shadow:0 28px 72px rgba(0,0,0,.32)}
  .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .modal-title{font-size:18px;font-weight:800;color:${o.p1}}
  .modal-close{background:#f1f5f9;border:none;border-radius:8px;width:34px;height:34px;
    cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{background:#e2e8f0}

  /* \u2500\u2500 ALERTA AUTOM\xC1TICA \u2500\u2500 */
  .alert-banner{border-radius:11px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
  .alert-r{background:#fef2f2;border:1.5px solid #fca5a5}
  .alert-y{background:#fffbeb;border:1.5px solid #fcd34d}
  .alert-g{background:#f0fdf4;border:1.5px solid #86efac}
  .alert-v{background:#faf5ff;border:1.5px solid #c4b5fd}

  /* \u2500\u2500 CALIFICACIONES \u2500\u2500 */
  .cal-inp{width:50px;padding:5px 3px;text-align:center;border:1.5px solid #d1d5db;
    border-radius:7px;font-size:13px;font-weight:700;outline:none;transition:all .15s}
  .cal-inp:focus{border-color:${o.p3};box-shadow:0 0 0 2px ${o.p3}22}
  .cal-bajo{background:#fee2e2!important;border-color:#fca5a5!important;color:#991b1b}
  .cal-medio{background:#fef3c7!important;border-color:#fcd34d!important}
  .cal-alto{background:#dcfce7!important;border-color:#86efac!important;color:#166534}
  .cal-ef{background:#f5f3ff!important;border-color:#c4b5fd!important}

  /* \u2500\u2500 ASISTENCIA \u2500\u2500 */
  .ast-P{background:#dcfce7;color:#166534;border-radius:8px;padding:6px 14px;
    font-weight:700;font-size:13px;cursor:pointer;border:none;min-width:46px}
  .ast-A{background:#fee2e2;color:#991b1b;border-radius:8px;padding:6px 14px;
    font-weight:700;font-size:13px;cursor:pointer;border:none;min-width:46px}
  .ast-J{background:#fef3c7;color:#92400e;border-radius:8px;padding:6px 14px;
    font-weight:700;font-size:13px;cursor:pointer;border:none;min-width:46px}

  /* \u2500\u2500 PROGRESS BAR \u2500\u2500 */
  .prog-bar{background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

  /* \u2500\u2500 TAGS ROL \u2500\u2500 */
  .rol-tag{display:inline-flex;align-items:center;gap:4px;border-radius:99px;
    padding:3px 10px;font-size:11px;font-weight:700;border:1.5px solid currentColor}

  /* \u2500\u2500 LOGIN \u2500\u2500 */
  .login-wrap{min-height:100vh;background:linear-gradient(145deg,#061428 0%,${o.p1} 35%,${o.p2} 70%,${o.p3} 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .login-card{background:#fff;border-radius:22px;padding:34px 30px;width:100%;
    max-width:420px;box-shadow:0 28px 80px rgba(0,0,0,.35)}
  .login-inp{width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:11px;
    font-size:15px;outline:none;transition:all .2s;font-family:inherit}
  .login-inp:focus{border-color:${o.p3};box-shadow:0 0 0 4px ${o.p3}18}
  .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,${o.p1},${o.p3});
    color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;
    cursor:pointer;letter-spacing:.4px;transition:all .2s;font-family:inherit}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px ${o.p1}66}
  .login-btn:active{transform:translateY(0)}
  .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

  /* \u2500\u2500 RESPALDO AVISO \u2500\u2500 */
  .backup-banner{position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:linear-gradient(135deg,${o.w1},${o.w2});
    color:#fff;padding:12px 20px;display:flex;justify-content:space-between;
    align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,.2)}

  /* \u2500\u2500 PRINT \u2500\u2500 */
  @media print {
    .no-print{display:none!important}
    .print-show{display:block!important}
    .print-hdr{display:flex!important}
    @page{size:letter portrait;margin:1.3cm 1.6cm}
    body{background:#fff!important;font-family:Arial,sans-serif}
    .card{box-shadow:none!important;border:1px solid #ccc!important}
    .tbl th{background:${o.p1}!important;color:#fff!important;
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    .chip{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .chip-u{background:#fce7f3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .topbar,.ham,.drawer-ov,.toast,.backup-banner{display:none!important}
  }

  /* \u2500\u2500 RESPONSIVE M\xD3VIL \u2500\u2500 */
  @media(max-width:640px){
    .tb-tab{padding:7px 8px;font-size:11px}
    .tbl th,.tbl td{padding:5px 6px;font-size:11px}
    .btn{padding:8px 12px;font-size:12px}
    .card-pad{padding:12px}
    .login-card{padding:22px 16px}
    .topbar{position:sticky;top:0;z-index:100}
    .cal-inp{width:44px;font-size:13px}
    .inp,.sel{font-size:14px}
    main{padding:10px 6px 24px!important}
  }
  @media(max-width:400px){
    .tb-tab{padding:6px 6px;font-size:10px}
    .tbl th,.tbl td{padding:4px 4px;font-size:10px}
  }
