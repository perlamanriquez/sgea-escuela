// Hash SHA-256 simple (navegador nativo)
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

const hoy = () => new Date().toISOString().slice(0,10);
const ahora = () => new Date().toLocaleString("es-MX");
const fmtFecha = s => s ? String(s).slice(0,10) : "";
const uid = () => Math.random().toString(36).slice(2,9).toUpperCase();

function calcEdad(fnac, ciclo="2025-2026") {
  if(!fnac || fnac==="nan") return "";
  const yr = parseInt((ciclo||"2025-2026").split("-")[0]);
  const ref = new Date(yr, 8, 1);
  const n   = new Date(fnac);
  if(isNaN(n)) return "";
  let a = ref.getFullYear() - n.getFullYear();
  if(ref < new Date(ref.getFullYear(), n.getMonth(), n.getDate())) a--;
  return a;
}

function promedioArr(vals) {
  const v = vals.filter(x => x !== undefined && x !== "" && !isNaN(+x));
  return v.length ? +(v.reduce((a,b) => a + +b, 0)/v.length).toFixed(2) : null;
}

// Calcula campo "De lo Humano" con ponderación EF
function calHumano(calMae, calEF, pctEF=33) {
  const m = parseFloat(calMae), e = parseFloat(calEF);
  if(!isNaN(m) && !isNaN(e)) return +((m*(100-pctEF)/100) + (e*pctEF/100)).toFixed(2);
  if(!isNaN(m)) return +m.toFixed(2);
  if(!isNaN(e)) return +e.toFixed(2);
  return null;
}

// Número de grupo clave: "1A", "2B", etc.
const grupoKey = g => g ? `${g.grado}${g.letra}` : "";

// Busca docente de un grupo en la lista de usuarios
const docenteDeGrupo = (grupo, usuarios) =>
  usuarios.find(u => u.grupo === grupoKey(grupo));

const nombreCompleto = a =>
  `${a.primer_apellido||""} ${a.segundo_apellido||""}, ${a.nombre||""}`.trim().replace(/^,\s*/,"");

// ══════════════════════════════════════════════════════════════════
// PERSISTENCIA — localStorage + JSON backup
// ══════════════════════════════════════════════════════════════════
function cargarEstado() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (d.schemaVersion !== SCHEMA_VERSION) return null; // migración futura
    return d;
  } catch { return null; }
}

function guardarEstado(estado) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ ...estado, schemaVersion: SCHEMA_VERSION, tsGuardado: ahora() }));
  } catch(e) { console.warn("localStorage lleno:", e); }
}

function estadoInicial() {
  const saved = cargarEstado();
  if (saved) return saved;
  return {
    schemaVersion: SCHEMA_VERSION,
    catalogos: {
      usuarios: USUARIOS_DEFAULT.map(u => ({ ...u })),
      grupos: GRUPOS_DEFAULT.map(g => ({ ...g })),
      materias: MATERIAS_DEFAULT.map(m => ({ ...m })),
      ciclos: [...CICLOS_DEFAULT],
    },
    cicloActivo: "2025-2026",
    tsRespaldo: null,
    cambiosSinRespaldar: 0,
    ciclosData: {
      "2025-2026": {
        alumnos: ALUMNOS_BASE.map(a => ({ ...a })),
        movimientos: [],
        asistencias: {},
        calificaciones: {},
        efCalificaciones: {},
        cortes911: {},
        usaerAlumnos: USAER_INICIAL.map(u => ({ ...u })),
        bitacora: [],
      }
    }
  };
}

// Exportar respaldo completo JSON
function exportarJSON(estado) {
  const blob = new Blob([JSON.stringify({ ...estado, _exportado: ahora() }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url;
  a.download = `SGEA_respaldo_${hoy()}.json`; a.click();
  URL.revokeObjectURL(url);
}

// Importar respaldo JSON — devuelve estado o null
async function importarJSON(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => { try { res(JSON.parse(e.target.result)); } catch { rej("JSON inválido"); } };
    r.onerror = () => rej("Error al leer archivo");
    r.readAsText(file);
  });
}

// ── EXCEL EXPORT (SheetJS) ─────────────────────────────────────
function exportXLSX(sheets, filename) {
  const wb = XLSX.utils.book_new();
  sheets.forEach(({ name, data, cols }) => {
    const ws = XLSX.utils.aoa_to_sheet(data);
    if (cols) ws["!cols"] = cols.map(w => ({ wch: w }));
    XLSX.utils.book_append_sheet(wb, ws, name.slice(0, 31));
  });
  XLSX.writeFile(wb, filename);
}

// ── BITÁCORA ─────────────────────────────────────────────────────
function nuevaBitacora(usuario, accion, detalle="") {
  return { id: uid(), ts: ahora(), fecha: hoy(), usuario: usuario.user, nombre: usuario.nombre, accion, detalle };
}

// ── SHA-256 (async) ───────────────────────────────────────────────
async function hashPass(pass) {
  if (pass.startsWith(PASS_MARKER)) return pass;
  const h = await sha256(pass);
  return PASS_MARKER + h;
}
async function checkPass(plain, stored) {
  if (!stored.startsWith(PASS_MARKER)) return plain === stored; // legacy
  const h = await sha256(plain);
  return PASS_MARKER + h === stored;
}

// APP ROOT
// ══════════════════════════════════════════════════════════════════
export default function App() {
  useStyles();
  const [estado, _setEstado] = useState(() => estadoInicial());
  const [usuario, setUsuario] = useState(null);
  const [toast, setToast] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const pendiente = useRef(false);

  // Wrapper que guarda en localStorage automáticamente y cuenta cambios
  const setEstado = useCallback(fn => {
    _setEstado(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      const withCounter = { ...next, cambiosSinRespaldar: (next.cambiosSinRespaldar || 0) + 1 };
      guardarEstado(withCounter);
      return withCounter;
    });
  }, []);

  // Atajos para leer datos del ciclo activo
  const ciclo = estado.cicloActivo;
  const cats   = estado.catalogos;
  const cData  = estado.ciclosData[ciclo] || {
    alumnos: [], movimientos: [], asistencias: {}, calificaciones: {},
    efCalificaciones: {}, cortes911: {}, usaerAlumnos: [], bitacora: [],
  };

  // Actualizar solo datos del ciclo activo
  const updCiclo = useCallback(fn => {
    setEstado(prev => {
      const cur = prev.ciclosData[prev.cicloActivo] || {
        alumnos:[], movimientos:[], asistencias:{}, calificaciones:{},
        efCalificaciones:{}, cortes911:{}, usaerAlumnos:[], bitacora:[],
      };
      return { ...prev, ciclosData: { ...prev.ciclosData, [prev.cicloActivo]: typeof fn === "function" ? fn(cur) : fn } };
    });
  }, [setEstado]);

  const notify = useCallback((msg, tipo = "ok") => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 3500);
  }, []);

  const addBitacora = useCallback((accion, detalle = "") => {
    if (!usuario) return;
    const entrada = nuevaBitacora(usuario, accion, detalle);
    updCiclo(d => ({ ...d, bitacora: [...(d.bitacora || []), entrada] }));
  }, [usuario, updCiclo]);

  const showConfirm = useCallback((msg, onOk) => {
    setConfirm({ msg, onOk });
  }, []);

  // Respaldo al cerrar sesión si hay cambios
  const handleLogout = useCallback(() => {
    if (estado.cambiosSinRespaldar > 5) {
      showConfirm(`Tiene ${estado.cambiosSinRespaldar} cambios sin respaldar. ¿Desea hacer un respaldo antes de salir?`, () => {
        exportarJSON(estado);
        setEstado(p => ({ ...p, tsRespaldo: ahora(), cambiosSinRespaldar: 0 }));
        setConfirm(null);
        setUsuario(null);
      });
      // También permitir salir sin respaldar
      return;
    }
    setUsuario(null);
  }, [estado, showConfirm, setEstado]);

  if (!usuario) return <Login catalogos={cats} onLogin={setUsuario} notify={notify} />;

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      {toast && <Toast msg={toast.msg} tipo={toast.tipo} />}
      {confirm && (
        <Confirm msg={confirm.msg}
          onOk={confirm.onOk}
          onCancel={() => { setConfirm(null); setUsuario(null); }} />
      )}
      <Sistema
        usuario={usuario} onLogout={handleLogout}
        estado={estado} setEstado={setEstado}
        cData={cData} updCiclo={updCiclo}
        notify={notify} addBitacora={addBitacora}
        showConfirm={showConfirm}
      />
      {estado.cambiosSinRespaldar > 20 && (
        <div className="backup-banner no-print">
          <span style={{ fontWeight: 700 }}>⚠️ {estado.cambiosSinRespaldar} cambios sin respaldar</span>
          <Btn cls="btn-dark" onClick={() => {
            exportarJSON(estado);
            setEstado(p => ({ ...p, tsRespaldo: ahora(), cambiosSinRespaldar: 0 }));
            notify("Respaldo guardado ✅");
          }}>💾 Respaldar ahora</Btn>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════════
function Login({ catalogos, onLogin, notify }) {
  const [user, setUser] = useState(""); const [pass, setPass] = useState("");
  const [err, setErr]   = useState(""); const [vis, setVis]   = useState(false);
  const [busy, setBusy] = useState(false);

  const entrar = async () => {
    if (!user.trim() || !pass.trim()) { setErr("Complete usuario y contraseña"); return; }
    setBusy(true);
    const u = (catalogos.usuarios || USUARIOS_DEFAULT).find(x => x.user === user.trim().toLowerCase());
    if (!u) { setErr("Usuario no encontrado"); setBusy(false); return; }
    const ok = await checkPass(pass.trim(), u.pass);
    if (ok) { onLogin(u); }
    else { setErr("Contraseña incorrecta"); setTimeout(() => setErr(""), 3000); }
    setBusy(false);
  };

  return (
    <div className="login-wrap fade-up">
      <div style={{ textAlign: "center", marginBottom: 24, color: "#fff" }}>
        <div style={{ fontSize: 56, marginBottom: 10 }}>🏫</div>
        <div style={{ fontWeight: 800, fontSize: 18, lineHeight: 1.3, textShadow: "0 2px 12px rgba(0,0,0,.4)" }}>
          Escuela Primaria<br />Profra. Emma I. Osuna Mancillas T.M.
        </div>
        <div style={{ fontSize: 12, opacity: .65, marginTop: 6 }}>CCT: 03DPR0338D · La Paz, B.C.S. · Turno Matutino</div>
      </div>

      <div className="login-card">
        <h2 style={{ color: C.p1, textAlign: "center", fontSize: 20, fontWeight: 800, marginBottom: 22 }}>🔐 Acceso al Sistema</h2>
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", fontWeight: 700, color: "#374151", marginBottom: 5, fontSize: 13 }}>👤 Usuario</label>
          <input className="login-inp" type="text" value={user}
            onChange={e => setUser(e.target.value)} onKeyDown={e => e.key === "Enter" && entrar()}
            placeholder="Ingrese su usuario" autoComplete="username" autoCapitalize="none" />
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ display: "block", fontWeight: 700, color: "#374151", marginBottom: 5, fontSize: 13 }}>🔑 Contraseña</label>
          <div style={{ position: "relative" }}>
            <input className="login-inp" type={vis ? "text" : "password"} value={pass}
              onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && entrar()}
              placeholder="Ingrese su contraseña" autoComplete="current-password" style={{ paddingRight: 48 }} />
            <button onClick={() => setVis(!vis)} style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 19, color: "#94a3b8", padding: 0 }}>{vis ? "🙈" : "👁️"}</button>
          </div>
        </div>
        {err && <div style={{ background: "#fee2e2", color: "#991b1b", borderRadius: 9, padding: "10px 14px", marginBottom: 14, fontWeight: 700, fontSize: 13, textAlign: "center" }}>❌ {err}</div>}
        <button className="login-btn" onClick={entrar} disabled={busy}>{busy ? "Verificando…" : "Entrar →"}</button>

        <div style={{ marginTop: 18, background: "#f0f9ff", borderRadius: 11, padding: "12px 14px", border: "1px solid #bae6fd" }}>
          <div style={{ fontWeight: 700, color: "#0369a1", fontSize: 12, marginBottom: 8 }}>💡 Accesos del sistema:</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "3px 10px", fontSize: 11, color: "#475569" }}>
            {(catalogos.usuarios || USUARIOS_DEFAULT).slice(0, 8).map(u => (
              <div key={u.id}>{ROL_META[u.rol]?.ic || "👤"} <strong>{u.user}</strong> — {ROLES_LABELS[u.rol] || u.rol}</div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ color: "rgba(255,255,255,.35)", fontSize: 11, marginTop: 16 }}>SGEA v5.0 © {new Date().getFullYear()}</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// SISTEMA PRINCIPAL — Navegación y routing
// ══════════════════════════════════════════════════════════════════
function Sistema({ usuario, onLogout, estado, setEstado, cData, updCiclo, notify, addBitacora, showConfirm }) {
  const rol    = usuario.rol;
  const cats   = estado.catalogos;
  const ciclo  = estado.cicloActivo;
  const grupos = cats.grupos || GRUPOS_DEFAULT;
  const activos = cData.alumnos.filter(a => a.activo);

  const esAdmin = ["director", "subdir_gestion"].includes(rol);
  const esAcad  = rol === "subdir_academico";
  const esMae   = rol === "maestro";
  const esEF    = rol === "ef";
  const esUSAER = rol === "usaer";

  // Grupo del maestro (basado en catálogo de grupos)
  const grupoMae = usuario.grupo;
  const alumsMae = activos.filter(a => `${a.grado}${a.grupo}` === grupoMae);

  const [mod, setMod]       = useState(null);
  const [drawer, setDrawer] = useState(false);

  const TABS_ADMIN = [
    { id: "dash",      ic: "🏠",  lb: "Inicio" },
    { id: "alumnos",   ic: "👨‍🎓", lb: "Alumnos" },
    { id: "movis",     ic: "📋",  lb: "Altas/Bajas" },
    { id: "asist",     ic: "📅",  lb: "Asistencia" },
    { id: "cals",      ic: "📝",  lb: "Calificaciones" },
    { id: "becas",     ic: "🎓",  lb: "Becas" },
    { id: "e911",      ic: "📊",  lb: "Est. 911" },
    { id: "reportes",  ic: "📈",  lb: "Reportes" },
    { id: "usaer",     ic: "♿",  lb: "USAER" },
    { id: "catalogos", ic: "⚙️",  lb: "Catálogos" },
    { id: "importexp", ic: "📦",  lb: "Import/Export" },
    { id: "bitacora",  ic: "📜",  lb: "Bitácora" },
  ];
  const TABS_ACAD = [
    { id: "dash",     ic: "🏠",  lb: "Inicio" },
    { id: "alumnos",  ic: "👨‍🎓", lb: "Alumnos" },
    { id: "asist",    ic: "📅",  lb: "Asistencia" },
    { id: "cals",     ic: "📝",  lb: "Calificaciones" },
    { id: "e911",     ic: "📊",  lb: "Est. 911" },
    { id: "reportes", ic: "📈",  lb: "Reportes" },
    { id: "usaer",    ic: "♿",  lb: "USAER" },
  ];
  const TABS_MAE = [
    { id: "mis_alumnos", ic: "👨‍🎓", lb: "Mis Alumnos" },
    { id: "asist",       ic: "📅",  lb: "Asistencia" },
    { id: "cals",        ic: "📝",  lb: "Calificaciones" },
    { id: "mis_rep",     ic: "📈",  lb: "Mis Reportes" },
    { id: "boleta",      ic: "📄",  lb: "Boletas" },
    { id: "mi_pass",     ic: "🔑",  lb: "Mi Cuenta" },
  ];
  const TABS_EF = [
    { id: "ef_cals", ic: "⚽",  lb: "Calificaciones EF" },
    { id: "ef_rep",  ic: "📈",  lb: "Mi Reporte" },
    { id: "mi_pass", ic: "🔑",  lb: "Mi Cuenta" },
  ];
  const TABS_USAER = [
    { id: "usaer",     ic: "♿",  lb: "Registro USAER" },
    { id: "usaer_rep", ic: "📊",  lb: "Reportes USAER" },
    { id: "mi_pass",   ic: "🔑",  lb: "Mi Cuenta" },
  ];

  const TABS = esAdmin ? TABS_ADMIN : esAcad ? TABS_ACAD : esMae ? TABS_MAE : esEF ? TABS_EF : TABS_USAER;
  const modActivo = mod || TABS[0].id;
  const nav = id => { setMod(id); setDrawer(false); };

  const rolInfo = ROL_META[rol] || { ic: "👤" };

  // Helpers para pasar a módulos
  const setAlumnos        = fn => updCiclo(d => ({ ...d, alumnos:         typeof fn === "function" ? fn(d.alumnos)          : fn }));
  const setMovimientos    = fn => updCiclo(d => ({ ...d, movimientos:      typeof fn === "function" ? fn(d.movimientos)      : fn }));
  const setAsistencias    = fn => updCiclo(d => ({ ...d, asistencias:      typeof fn === "function" ? fn(d.asistencias)      : fn }));
  const setCalificaciones = fn => updCiclo(d => ({ ...d, calificaciones:   typeof fn === "function" ? fn(d.calificaciones)   : fn }));
  const setEfCals         = fn => updCiclo(d => ({ ...d, efCalificaciones: typeof fn === "function" ? fn(d.efCalificaciones) : fn }));
  const setCortes911      = fn => updCiclo(d => ({ ...d, cortes911:        typeof fn === "function" ? fn(d.cortes911)        : fn }));
  const setUsaer          = fn => updCiclo(d => ({ ...d, usaerAlumnos:     typeof fn === "function" ? fn(d.usaerAlumnos)     : fn }));
  const setCatalogos      = fn => setEstado(p => ({ ...p, catalogos:        typeof fn === "function" ? fn(p.catalogos)        : fn }));

  const soloLectura = esAcad;

  const PROPS_BASE = { ciclo, grupos, catalogs: cats, notify, addBitacora, showConfirm, usuario };
  const PROPS_DATA = {
    ...PROPS_BASE, cData,
    alumnos: cData.alumnos, activos,
    asistencias: cData.asistencias, calificaciones: cData.calificaciones,
    efCals: cData.efCalificaciones, usaerAlumnos: cData.usaerAlumnos,
    movimientos: cData.movimientos, cortes911: cData.cortes911,
    setAlumnos, setMovimientos, setAsistencias, setCalificaciones,
    setEfCals, setCortes911, setUsaer,
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      {/* TOPBAR */}
      <header className="topbar no-print">
        <div className="tb-row">
          <button className="ham" onClick={() => setDrawer(!drawer)}>{drawer ? "✕" : "☰"}</button>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {rolInfo.ic} {esAdmin || esAcad ? ESCUELA.nombre : usuario.nombre}
            </div>
            <div style={{ fontSize: 11, opacity: .7, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              <RolTag rol={rol} /> · CCT {ESCUELA.cct} · Ciclo {ciclo}
            </div>
          </div>
          {(esAdmin) && (
            <select className="sel" style={{ background: "rgba(255,255,255,.15)", color: "#fff", border: "1.5px solid rgba(255,255,255,.3)", borderRadius: 8, padding: "5px 9px", fontSize: 12 }}
              value={ciclo} onChange={e => setEstado(p => ({ ...p, cicloActivo: e.target.value }))}>
              {(cats.ciclos || CICLOS_DEFAULT).map(c => <option key={c} value={c} style={{ background: C.p1 }}>{c}</option>)}
            </select>
          )}
          <button onClick={onLogout} style={{ background: "rgba(239,68,68,.3)", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Salir</button>
        </div>
        <div className="tb-tabs">
          {TABS.map(t => <button key={t.id} className={`tb-tab ${modActivo === t.id ? "on" : ""}`} onClick={() => nav(t.id)}>{t.ic} {t.lb}</button>)}
        </div>
      </header>

      {/* DRAWER MÓVIL */}
      {drawer && (
        <div className="drawer-ov no-print" onClick={() => setDrawer(false)}>
          <nav className="drawer" onClick={e => e.stopPropagation()}>
            <div style={{ padding: "20px 18px 13px", borderBottom: "1px solid rgba(255,255,255,.1)" }}>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>{usuario.nombre}</div>
              <div style={{ marginTop: 5 }}><RolTag rol={rol} /></div>
              {esAdmin && (
                <select className="sel" style={{ width: "100%", marginTop: 10, background: "rgba(255,255,255,.15)", color: "#fff", border: "1px solid rgba(255,255,255,.3)", fontSize: 12 }}
                  value={ciclo} onChange={e => { setEstado(p => ({ ...p, cicloActivo: e.target.value })); setDrawer(false); }}>
                  {(cats.ciclos || CICLOS_DEFAULT).map(c => <option key={c} style={{ background: C.p1 }}>{c}</option>)}
                </select>
              )}
            </div>
            <div style={{ flex: 1, padding: "8px 0" }}>
              {TABS.map(t => <button key={t.id} className={`dw-item ${modActivo === t.id ? "on" : ""}`} onClick={() => nav(t.id)}>{t.ic} {t.lb}</button>)}
            </div>
            <div style={{ padding: "13px 16px", borderTop: "1px solid rgba(255,255,255,.1)" }}>
              <button onClick={onLogout} style={{ width: "100%", background: "#ef4444", color: "#fff", border: "none", borderRadius: 9, padding: 13, fontWeight: 700, cursor: "pointer", fontSize: 14 }}>🚪 Cerrar Sesión</button>
            </div>
          </nav>
        </div>
      )}

      {/* CONTENIDO PRINCIPAL */}
      <main style={{ flex: 1, padding: "14px 10px 28px", maxWidth: 1360, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

        {/* ADMIN / SUBDIR GESTIÓN */}
        {(esAdmin || esAcad) && modActivo === "dash"      && <ModDash      {...PROPS_DATA} soloLectura={soloLectura} />}
        {(esAdmin || esAcad) && modActivo === "alumnos"   && <ModAlumnos   {...PROPS_DATA} soloLectura={soloLectura} />}
        {esAdmin             && modActivo === "movis"     && <ModMovimientos {...PROPS_DATA} />}
        {(esAdmin || esAcad) && modActivo === "asist"     && <ModAsistencia {...PROPS_DATA} grupoFijo={null} soloLectura={soloLectura} />}
        {(esAdmin || esAcad) && modActivo === "cals"      && <ModCalificaciones {...PROPS_DATA} grupoFijo={null} soloLectura={soloLectura} />}
        {esAdmin             && modActivo === "becas"     && <ModBecas      {...PROPS_DATA} />}
        {(esAdmin || esAcad) && modActivo === "e911"      && <ModEst911     {...PROPS_DATA} soloLectura={soloLectura} />}
        {(esAdmin || esAcad) && modActivo === "reportes"  && <ModReportes   {...PROPS_DATA} />}
        {(esAdmin || esAcad) && modActivo === "usaer"     && <ModUSAER      {...PROPS_DATA} soloLectura={soloLectura} />}
        {esAdmin             && modActivo === "catalogos" && <ModCatalogos  {...PROPS_BASE} catalogs={cats} setCatalogos={setCatalogos} estado={estado} />}
        {esAdmin             && modActivo === "importexp" && <ModImportExport {...PROPS_DATA} estado={estado} setEstado={setEstado} />}
        {esAdmin             && modActivo === "bitacora"  && <ModBitacora   bitacora={cData.bitacora || []} ciclo={ciclo} />}

        {/* MAESTRO */}
        {esMae && modActivo === "mis_alumnos" && <ModMisAlumnos alumnos={alumsMae} {...PROPS_BASE} usaerAlumnos={cData.usaerAlumnos} />}
        {esMae && modActivo === "asist"       && <ModAsistencia {...PROPS_DATA} alumnos={alumsMae.filter(a => a.activo)} grupoFijo={grupoMae} />}
        {esMae && modActivo === "cals"        && <ModCalificaciones {...PROPS_DATA} alumnos={alumsMae.filter(a => a.activo)} grupoFijo={grupoMae} />}
        {esMae && modActivo === "mis_rep"     && <ModMisReportes alumnos={alumsMae} {...PROPS_DATA} grupoFijo={grupoMae} />}
        {esMae && modActivo === "boleta"      && <ModBoleta alumnos={alumsMae.filter(a => a.activo)} {...PROPS_DATA} grupoFijo={grupoMae} />}

        {/* EF */}
        {esEF && modActivo === "ef_cals" && <ModEFCalificaciones {...PROPS_DATA} />}
        {esEF && modActivo === "ef_rep"  && <ModEFReporte        {...PROPS_DATA} />}

        {/* USAER */}
        {esUSAER && modActivo === "usaer"     && <ModUSAER     {...PROPS_DATA} />}
        {esUSAER && modActivo === "usaer_rep" && <ModUSAERRep  {...PROPS_DATA} />}

        {/* CAMBIAR CONTRASEÑA (todos los roles) */}
        {modActivo === "mi_pass" && <ModMiCuenta usuario={usuario} catalogs={cats} setCatalogos={fn => setEstado(p => ({ ...p, catalogos: typeof fn === "function" ? fn(p.catalogos) : fn }))} notify={notify} addBitacora={addBitacora} />}
      </main>

      <footer className="no-print" style={{ background: C.p1, color: "rgba(255,255,255,.35)", textAlign: "center", padding: 7, fontSize: 10.5 }}>
        {ESCUELA.nombre} · CCT {ESCUELA.cct} · Ciclo {ciclo} · SGEA v5.0
        {estado.tsRespaldo && <span style={{ marginLeft: 12 }}>💾 Último respaldo: {estado.tsRespaldo}</span>}
      </footer>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MÓDULO: DASHBOARD
// ══════════════════════════════════════════════════════════════════
function ModDash({ activos, movimientos, asistencias, calificaciones, efCals, ciclo, grupos, catalogs, usaerAlumnos, soloLectura }) {
  const becados = activos.filter(a => a.becado);
  const asHoy   = asistencias[hoy()] || {};
  const presHoy = Object.values(asHoy).filter(v => v === "P").length;
  const regHoy  = Object.keys(asHoy).length;

  // Alertas automáticas
  const sinDocente = grupos.filter(g => !g.docenteId && activos.some(a => `${a.grado}${a.grupo}` === grupoKey(g)));
  const rezagoCount = useMemo(() => {
    let n = 0;
    activos.forEach(a => {
      const mat = catalogs.materias || MATERIAS_DEFAULT;
      ["1","2","3"].forEach(p => {
        const key = `${a.grado}${a.grupo}-P${p}`;
        const d = calificaciones[key] || {};
        const ef = efCals[key] || {};
        const vals = mat.map((m, i) => {
          if (!m.tieneEF) return (d[a.matricula] || {})[i];
          return calHumano((d[a.matricula] || {})[i], (ef[a.matricula] || {})[i], m.pctEF);
        }).filter(v => v !== null && v !== undefined);
        if (vals.length && promedioArr(vals) < 6) n++;
      });
    });
    return n;
  }, [activos, calificaciones, efCals, catalogs.materias]);

  return (
    <div className="fade-up">
      <CabImpresion titulo="PANEL GENERAL" ciclo={ciclo} />
      <PageTitle icon="🏠" title="Panel Principal">
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <PrintBtn />
      </PageTitle>

      {/* Alertas */}
      {sinDocente.length > 0 && (
        <div className="alert-banner alert-y">
          <span style={{ fontSize: 20 }}>⚠️</span>
          <div>
            <strong style={{ color: C.w1 }}>Grupos sin docente asignado:</strong>
            <div style={{ fontSize: 12, marginTop: 3 }}>{sinDocente.map(g => grupoKey(g)).join(", ")}</div>
          </div>
        </div>
      )}
      {rezagoCount > 0 && (
        <div className="alert-banner alert-r">
          <span style={{ fontSize: 20 }}>🚨</span>
          <div><strong style={{ color: C.d1 }}>Alertas de rezago académico:</strong>
            <div style={{ fontSize: 12, marginTop: 3 }}>{rezagoCount} registros con promedio menor a 6.0</div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(135px,1fr))", gap: 10, marginBottom: 16 }}>
        {[
          ["👨‍🎓", "Activos",    activos.length,            C.p3],
          ["✅",   "Altas",     movimientos.filter(m=>m.tipo==="ALTA").length, C.s1],
          ["❌",   "Bajas",     activos.length ? movimientos.filter(m=>m.tipo==="BAJA").length : 0, C.d1],
          ["🎓",   "Becados",   becados.length,             C.w1],
          ["♿",   "USAER",     usaerAlumnos.length,         C.v1],
          ["📅",   "Pres. Hoy", regHoy > 0 ? `${presHoy}/${regHoy}` : "—", C.p2],
        ].map(([ic, lb, vl, co]) => (
          <div key={lb} className="stat-card" style={{ borderTop: `4px solid ${co}` }}>
            <div style={{ fontSize: 26 }}>{ic}</div>
            <div style={{ fontSize: 26, fontWeight: 800, color: co }}>{vl}</div>
            <div style={{ fontSize: 11, color: C.muted }}>{lb}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(290px,1fr))", gap: 14, marginBottom: 14 }}>
        {/* Por grado */}
        <Card style={{ padding: 16 }}>
          <h3 style={{ color: C.p1, margin: "0 0 12px", fontSize: 14, fontWeight: 700 }}>📊 Matrícula por Grado</h3>
          {[1,2,3,4,5,6].map(g => {
            const n = activos.filter(a => a.grado === String(g)).length;
            const pct = activos.length ? Math.round(n / activos.length * 100) : 0;
            return (
              <div key={g} style={{ marginBottom: 9 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                  <span style={{ fontWeight: 600 }}>{g}° Grado</span>
                  <span style={{ color: C.muted }}>{n} alumnos ({pct}%)</span>
                </div>
                <div className="prog-bar">
                  <div className="prog-fill" style={{ width: `${pct}%`, background: `linear-gradient(90deg,${C.p2},${C.p4})` }} />
                </div>
              </div>
            );
          })}
        </Card>

        {/* Datos del plantel */}
        <Card style={{ padding: 16 }}>
          <h3 style={{ color: C.p1, margin: "0 0 12px", fontSize: 14, fontWeight: 700 }}>🏫 Datos del Plantel</h3>
          {[
            ["CCT", ESCUELA.cct], ["Zona", `${ESCUELA.zona} (${ESCUELA.zonaCCT})`],
            ["Municipio", ESCUELA.municipio], ["Directora", ESCUELA.director],
            ["Turno", ESCUELA.turno], ["Ciclo activo", ciclo],
            ["Grupos", grupos.length], ["Total activos", activos.length],
            ["Con docente", grupos.filter(g => g.docenteId).length + " / " + grupos.length],
            ["USAER", usaerAlumnos.length + " alumnos"], ["Becados", becados.length],
          ].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
              <span style={{ fontWeight: 700, color: "#374151" }}>{k}</span>
              <span style={{ color: C.muted, textAlign: "right" }}>{v}</span>
            </div>
          ))}
        </Card>
      </div>

      {/* Tabla resumen grupos */}
      <Card>
        <CardHdr>
          <h3 style={{ margin: 0, fontSize: 14, color: C.p1, fontWeight: 700 }}>📋 Resumen por Grupo</h3>
        </CardHdr>
        <div style={{ overflowX: "auto" }}>
          <table className="tbl tbl-alt">
            <thead><tr>
              {["Grupo","Docente","H","M","Total","Becados","USAER"].map(h => (
                <th key={h} style={{ textAlign: h === "Docente" ? "left" : "center" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {grupos.map(g => {
                const gk = grupoKey(g);
                const doc = (catalogs.usuarios || []).find(u => u.id === g.docenteId);
                const del = activos.filter(a => `${a.grado}${a.grupo}` === gk);
                const nU  = usaerAlumnos.filter(u => u.grado_grupo === gk).length;
                return (
                  <tr key={g.id}>
                    <td style={{ textAlign: "center" }}><span className="chip chip-b">{gk}</span></td>
                    <td style={{ fontSize: 11 }}>
                      {doc ? doc.nombre : <span style={{ color: C.d1, fontStyle: "italic", fontSize: 11 }}>⚠️ Sin docente</span>}
                    </td>
                    <td style={{ textAlign: "center", color: C.p2, fontWeight: 700 }}>{del.filter(a => a.sexo === "HOMBRE").length}</td>
                    <td style={{ textAlign: "center", color: C.pink, fontWeight: 700 }}>{del.filter(a => a.sexo === "MUJER").length}</td>
                    <td style={{ textAlign: "center", fontWeight: 800, fontSize: 14 }}>{del.length}</td>
                    <td style={{ textAlign: "center" }}>{del.filter(a => a.becado).length || <span style={{ color: "#d1d5db" }}>—</span>}</td>
                    <td style={{ textAlign: "center" }}>{nU ? <span className="chip chip-u">{nU}</span> : <span style={{ color: "#d1d5db" }}>—</span>}</td>
                  </tr>
                );
              })}
              <tr className="tbl-total">
                <td colSpan={2} style={{ padding: "9px 10px" }}>TOTAL</td>
                <td style={{ textAlign: "center" }}>{activos.filter(a => a.sexo === "HOMBRE").length}</td>
                <td style={{ textAlign: "center" }}>{activos.filter(a => a.sexo === "MUJER").length}</td>
                <td style={{ textAlign: "center", fontSize: 15 }}>{activos.length}</td>
                <td style={{ textAlign: "center" }}>{becados.length}</td>
                <td style={{ textAlign: "center" }}><span className="chip chip-u">{usaerAlumnos.length}</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// MÓDULO: ALUMNOS
// ══════════════════════════════════════════════════════════════════
function ModAlumnos({ alumnos, activos, setAlumnos, setMovimientos, notify, addBitacora, ciclo, grupos, catalogs, usaerAlumnos, soloLectura }) {
  const [q, setQ]           = useState("");
  const [filtGrupo, setFG]  = useState("");
  const [filtEstado, setFE] = useState("activos");
  const [detalle, setDet]   = useState(null);
  const [altaOpen, setAlta] = useState(false);
  const [nuevo, setNuevo]   = useState({ primer_apellido:"",segundo_apellido:"",nombre:"",curp:"",fecha_nac:"",sexo:"HOMBRE",grado:"1",grupo:"A" });
  const [errores, setErrores] = useState({});
  const usaerCurps = useMemo(() => new Set(usaerAlumnos.map(u => u.curp)), [usaerAlumnos]);

  const lista = useMemo(() => alumnos.filter(a => {
    const ok1 = filtGrupo ? `${a.grado}${a.grupo}` === filtGrupo : true;
    const ok2 = filtEstado === "activos" ? a.activo : filtEstado === "bajas" ? !a.activo : true;
    const ok3 = q ? `${a.primer_apellido} ${a.segundo_apellido} ${a.nombre} ${a.matricula} ${a.curp}`.toLowerCase().includes(q.toLowerCase()) : true;
    return ok1 && ok2 && ok3;
  }), [alumnos, filtGrupo, filtEstado, q]);

  const validar = () => {
    const e = {};
    if (!nuevo.primer_apellido.trim()) e.primer_apellido = "Requerido";
    if (!nuevo.nombre.trim()) e.nombre = "Requerido";
    if (!nuevo.curp.trim()) e.curp = "Requerido";
    else if (!validarCURP(nuevo.curp.trim())) e.curp = "Formato CURP inválido";
    if (alumnos.find(a => a.curp === nuevo.curp.trim().toUpperCase())) e.curp = "CURP ya registrada";
    setErrores(e);
    return Object.keys(e).length === 0;
  };

  const darAlta = () => {
    if (!validar()) return;
    const mat = "NV" + Date.now().toString().slice(-7);
    const doc  = (catalogs.usuarios || []).find(u => u.grupo === `${nuevo.grado}${nuevo.grupo}`);
    const alumno = { ...nuevo, curp: nuevo.curp.toUpperCase(), matricula: mat, activo: true, becado: false, tipo_beca: "", turno: "M", docente: doc?.nombre || "" };
    setAlumnos(p => [...p, alumno]);
    setMovimientos(p => [...p, { tipo: "ALTA", matricula: mat, nombre: `${nuevo.primer_apellido} ${nuevo.nombre}`, grupo: `${nuevo.grado}${nuevo.grupo}`, fecha: hoy(), motivo: "Alta nueva inscripción", usuario: "sistema" }]);
    addBitacora("ALTA_ALUMNO", `${nuevo.primer_apellido} ${nuevo.nombre} — ${nuevo.grado}${nuevo.grupo} — CURP:${nuevo.curp}`);
    setAlta(false); setNuevo({ primer_apellido:"",segundo_apellido:"",nombre:"",curp:"",fecha_nac:"",sexo:"HOMBRE",grado:"1",grupo:"A" }); setErrores({});
    notify("Alta registrada ✅");
  };

  const darBaja = mat => {
    const a = alumnos.find(x => x.matricula === mat);
    if (!a || !a.activo) return;
    setAlumnos(p => p.map(x => x.matricula === mat ? { ...x, activo: false } : x));
    setMovimientos(p => [...p, { tipo: "BAJA", matricula: mat, nombre: `${a.primer_apellido} ${a.nombre}`, grupo: `${a.grado}${a.grupo}`, fecha: hoy(), motivo: "Baja desde expediente", usuario: "sistema" }]);
    addBitacora("BAJA_ALUMNO", `${a.primer_apellido} ${a.nombre} — Mat:${mat}`);
    setDet(null); notify("Baja registrada");
  };

  const exportar = () => {
    const rows = [["#","Matrícula","Primer Apellido","Segundo Apellido","Nombre","CURP","F.Nac","Edad","Sexo","Grado","Grupo","Estado","Becado","Tipo Beca","USAER","Condición USAER"]];
    lista.forEach((a, i) => {
      const uData = usaerAlumnos.find(u => u.curp === a.curp);
      rows.push([i+1, a.matricula, a.primer_apellido, a.segundo_apellido, a.nombre, a.curp, fmtFecha(a.fecha_nac), calcEdad(a.fecha_nac, ciclo), a.sexo, a.grado, a.grupo, a.activo?"Activo":"Baja", a.becado?"Sí":"No", a.tipo_beca||"", uData?"Sí":"No", uData?.condicion_usaer||""]);
    });
    exportXLSX([{ name: "Alumnos", data: rows, cols: [4,12,16,16,16,20,10,4,6,4,4,6,4,20,4,22] }], `Alumnos_${ciclo}_${hoy()}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo={`LISTA DE ALUMNOS${filtGrupo ? " — GRUPO " + filtGrupo : ""}`} ciclo={ciclo} />
      <PageTitle icon="👨‍🎓" title={`Alumnos (${lista.filter(a=>a.activo).length} activos / ${lista.length} total)`}>
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
        {!soloLectura && <Btn cls="btn-g" onClick={() => setAlta(true)}>➕ Alta</Btn>}
      </PageTitle>

      {/* Filtros */}
      <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 11, flexWrap: "wrap" }}>
        <input className="inp" style={{ flex: 1, minWidth: 180 }} value={q} onChange={e => setQ(e.target.value)} placeholder="🔍 Nombre, matrícula, CURP…" />
        <select className="sel" value={filtGrupo} onChange={e => setFG(e.target.value)}>
          <option value="">Todos los grupos</option>
          {grupos.map(g => <option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}</option>)}
        </select>
        <select className="sel" value={filtEstado} onChange={e => setFE(e.target.value)}>
          <option value="activos">Solo activos</option>
          <option value="bajas">Solo bajas</option>
          <option value="todos">Todos</option>
        </select>
      </div>

      <Card>
        <div style={{ overflowX: "auto" }}>
          <table className="tbl tbl-alt" style={{ fontSize: 12 }}>
            <thead><tr>
              <th style={{ width: 32, textAlign: "center" }}>#</th>
              <th style={{ minWidth: 160 }}>Apellidos, Nombre</th>
              <th style={{ textAlign: "center" }}>Grupo</th>
              <th>CURP</th>
              <th style={{ textAlign: "center" }}>F.Nac</th>
              <th style={{ textAlign: "center" }}>Edad</th>
              <th style={{ textAlign: "center" }}>Sx</th>
              <th style={{ textAlign: "center" }}>Estado</th>
            </tr></thead>
            <tbody>
              {lista.slice(0, 200).map((a, i) => {
                const enU  = usaerCurps.has(a.curp);
                const uDat = usaerAlumnos.find(u => u.curp === a.curp);
                return (
                  <tr key={a.matricula} onClick={() => setDet({ ...a, usaerData: uDat })} style={{ cursor: "pointer" }}>
                    <td style={{ textAlign: "center", color: C.muted, fontSize: 11 }}>{i + 1}</td>
                    <td>
                      <span style={{ fontWeight: 600 }}>{a.primer_apellido} {a.segundo_apellido}, {a.nombre}</span>
                      {enU && <> <UsaerBadge condicion={uDat?.condicion_usaer} /></>}
                      {a.becado && <> <span className="chip chip-y" style={{ fontSize: 9 }}>🎓</span></>}
                    </td>
                    <td style={{ textAlign: "center" }}><span className="chip chip-b">{a.grado}°{a.grupo}</span></td>
                    <td style={{ fontFamily: "monospace", fontSize: 10.5 }}>{a.curp}</td>
                    <td style={{ textAlign: "center", fontSize: 11 }}>{fmtFecha(a.fecha_nac)}</td>
                    <td style={{ textAlign: "center" }}>{calcEdad(a.fecha_nac, ciclo)}</td>
                    <td style={{ textAlign: "center" }}>{a.sexo === "HOMBRE" ? "H" : "M"}</td>
                    <td style={{ textAlign: "center" }}>
                      <span className={`chip ${a.activo ? "chip-g" : "chip-r"}`}>{a.activo ? "Activo" : "Baja"}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {lista.length > 200 && <div style={{ padding: "8px 14px", color: C.muted, fontSize: 12, textAlign: "center", borderTop: `1px solid ${C.border}` }}>Mostrando 200 de {lista.length}. Use filtros.</div>}
      </Card>

      {/* Modal detalle */}
      {detalle && (
        <div className="modal-bg" onClick={() => setDet(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 500 }}>
            <div className="modal-hdr">
              <span className="modal-title">📋 Expediente</span>
              <button className="modal-close" onClick={() => setDet(null)}>✕</button>
            </div>
            {detalle.usaerData && (
              <div style={{ background: "#fdf2f8", borderRadius: 9, padding: "8px 12px", marginBottom: 12, fontSize: 12 }}>
                <strong>♿ USAER:</strong> {detalle.usaerData.condicion_usaer}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 16 }}>
              {[["Matrícula", detalle.matricula], ["CURP", detalle.curp], ["Primer Apellido", detalle.primer_apellido], ["Segundo Apellido", detalle.segundo_apellido], ["Nombre(s)", detalle.nombre], ["F. Nacimiento", fmtFecha(detalle.fecha_nac)], ["Edad", `${calcEdad(detalle.fecha_nac, ciclo)} años`], ["Sexo", detalle.sexo], ["Grupo", `${detalle.grado}°${detalle.grupo}`], ["Estado", detalle.activo ? "✅ Activo" : "❌ Baja"], ["Beca", detalle.becado ? `🎓 ${detalle.tipo_beca}` : "Sin beca"], ["Turno", detalle.turno || "M"]].map(([k, v]) => (
                <div key={k} style={{ borderBottom: `1px solid ${C.border}`, paddingBottom: 5 }}>
                  <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, textTransform: "uppercase" }}>{k}</div>
                  <div style={{ fontWeight: 600, fontSize: 12.5, wordBreak: "break-all" }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {!soloLectura && detalle.activo && <Btn cls="btn-r" onClick={() => darBaja(detalle.matricula)}>❌ Dar de Baja</Btn>}
              <Btn cls="btn-gray" onClick={() => setDet(null)}>Cerrar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Modal alta */}
      {altaOpen && !soloLectura && (
        <div className="modal-bg" onClick={() => setAlta(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 560 }}>
            <div className="modal-hdr">
              <span className="modal-title">➕ Nuevo Alumno</span>
              <button className="modal-close" onClick={() => setAlta(false)}>✕</button>
            </div>
            <FormGrid>
              {[["primer_apellido","Primer Apellido *"],["segundo_apellido","Segundo Apellido"],["nombre","Nombre(s) *"],["curp","CURP *"]].map(([k, lb]) => (
                <Field key={k} label={lb} error={errores[k]}>
                  <input className={`inp${errores[k]?" inp-err":""}`} value={nuevo[k]}
                    onChange={e => setNuevo(p => ({ ...p, [k]: e.target.value.toUpperCase() }))} />
                </Field>
              ))}
              <Field label="F. Nacimiento">
                <input className="inp" type="date" value={nuevo.fecha_nac} onChange={e => setNuevo(p => ({ ...p, fecha_nac: e.target.value }))} />
              </Field>
              <Field label="Sexo">
                <select className="sel" style={{ width: "100%" }} value={nuevo.sexo} onChange={e => setNuevo(p => ({ ...p, sexo: e.target.value }))}>
                  <option>HOMBRE</option><option>MUJER</option>
                </select>
              </Field>
              <Field label="Grado">
                <select className="sel" style={{ width: "100%" }} value={nuevo.grado} onChange={e => setNuevo(p => ({ ...p, grado: e.target.value }))}>
                  {[1,2,3,4,5,6].map(g => <option key={g} value={g}>{g}°</option>)}
                </select>
              </Field>
              <Field label="Grupo">
                <select className="sel" style={{ width: "100%" }} value={nuevo.grupo} onChange={e => setNuevo(p => ({ ...p, grupo: e.target.value }))}>
                  {[...new Set(grupos.filter(g2 => g2.grado === nuevo.grado).map(g2 => g2.letra))].sort().map(l => <option key={l}>{l}</option>)}
                </select>
              </Field>
            </FormGrid>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn cls="btn-p" onClick={darAlta}>💾 Registrar</Btn>
              <Btn cls="btn-gray" onClick={() => setAlta(false)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// MÓDULO: ALTAS Y BAJAS
// ══════════════════════════════════════════════════════════════════
function ModMovimientos({ alumnos, setAlumnos, movimientos, setMovimientos, notify, addBitacora, ciclo }) {
  const [q, setQ] = useState(""); const [mot, setMot] = useState(""); const [sel, setSel] = useState(null);

  const buscar = () => {
    const ql = q.trim().toLowerCase();
    if (!ql) return;
    const a = alumnos.find(x => x.matricula === q.trim() || x.curp === q.trim().toUpperCase() || `${x.primer_apellido} ${x.segundo_apellido} ${x.nombre}`.toLowerCase().includes(ql));
    if (a) setSel(a); else notify("Alumno no encontrado", "err");
  };

  const registrar = tipo => {
    if (!sel) return;
    if (tipo === "BAJA" && !sel.activo) { notify("Ya está dado de baja", "err"); return; }
    if (tipo === "ALTA" && sel.activo)  { notify("Ya está activo", "err"); return; }
    setAlumnos(p => p.map(a => a.matricula === sel.matricula ? { ...a, activo: tipo === "ALTA" } : a));
    setMovimientos(p => [...p, { tipo, matricula: sel.matricula, nombre: `${sel.primer_apellido} ${sel.nombre}`, grupo: `${sel.grado}${sel.grupo}`, fecha: hoy(), motivo: mot || "Sin motivo" }]);
    addBitacora(`${tipo}_ALUMNO`, `${sel.primer_apellido} ${sel.nombre} — Mat:${sel.matricula}`);
    notify(`${tipo} registrada ✅`); setSel(null); setQ(""); setMot("");
  };

  const exportar = () => {
    const rows = [["Tipo","Fecha","Matrícula","Alumno","Grupo","Motivo"]];
    movimientos.forEach(m => rows.push([m.tipo, m.fecha, m.matricula, m.nombre, m.grupo, m.motivo||""]));
    exportXLSX([{ name: "Movimientos", data: rows, cols:[6,10,12,28,6,30] }], `Movimientos_${ciclo}_${hoy()}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo="REGISTRO DE ALTAS Y BAJAS" ciclo={ciclo} />
      <PageTitle icon="📋" title="Altas y Bajas">
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>
      <Card style={{ padding: 18, marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
          <input className="inp" style={{ flex: 1, minWidth: 200 }} value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === "Enter" && buscar()} placeholder="Matrícula, CURP o nombre del alumno" />
          <Btn cls="btn-p" onClick={buscar}>🔍 Buscar</Btn>
        </div>
        {sel && (
          <div style={{ background: "#f0f9ff", borderRadius: 12, padding: 16, border: "1px solid #bae6fd" }}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>{sel.primer_apellido} {sel.segundo_apellido}, {sel.nombre}</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 10 }}>Mat: {sel.matricula} · {sel.grado}°{sel.grupo} · <strong>{sel.activo ? "✅ Activo" : "❌ Baja"}</strong></div>
            <input className="inp" value={mot} onChange={e => setMot(e.target.value)} placeholder="Motivo del movimiento (requerido)" style={{ marginBottom: 10 }} />
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Btn cls="btn-g" onClick={() => registrar("ALTA")}>✅ Dar de ALTA</Btn>
              <Btn cls="btn-r" onClick={() => registrar("BAJA")}>❌ Dar de BAJA</Btn>
              <Btn cls="btn-gray" onClick={() => setSel(null)}>Cancelar</Btn>
            </div>
          </div>
        )}
      </Card>
      <Card>
        <CardHdr>
          <h3 style={{ margin: 0, fontSize: 14, color: C.p1 }}>Historial ({movimientos.length})</h3>
          <div style={{ display: "flex", gap: 6 }}>
            <span className="chip chip-g">A: {movimientos.filter(m => m.tipo === "ALTA").length}</span>
            <span className="chip chip-r">B: {movimientos.filter(m => m.tipo === "BAJA").length}</span>
          </div>
        </CardHdr>
        {movimientos.length === 0 ? <Empty icon="📋" msg="Sin movimientos registrados." /> : (
          <div style={{ overflowX: "auto" }}>
            <table className="tbl tbl-alt">
              <thead><tr>{["Tipo","Fecha","Matrícula","Alumno","Grupo","Motivo"].map(h => <th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {[...movimientos].reverse().map((m, i) => (
                  <tr key={i}>
                    <td><span className={`chip ${m.tipo === "ALTA" ? "chip-g" : "chip-r"}`}>{m.tipo}</span></td>
                    <td style={{ fontSize: 11 }}>{m.fecha}</td>
                    <td style={{ fontFamily: "monospace", fontSize: 10.5 }}>{m.matricula}</td>
                    <td style={{ fontWeight: 600 }}>{m.nombre}</td>
                    <td style={{ textAlign: "center" }}><span className="chip chip-b">{m.grupo}</span></td>
                    <td style={{ color: C.muted, fontSize: 11 }}>{m.motivo || "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MÓDULO: ASISTENCIA
// ══════════════════════════════════════════════════════════════════
function ModAsistencia({ activos, asistencias, setAsistencias, notify, ciclo, grupos, catalogs, usaerAlumnos, grupoFijo, soloLectura }) {
  const [fecha,  setFecha]  = useState(hoy());
  const [grupo,  setGrupo]  = useState(grupoFijo || (grupos[0] ? grupoKey(grupos[0]) : "1A"));
  const [tab,    setTab]    = useState("diario");
  const usaerSet = useMemo(() => new Set((usaerAlumnos || []).map(u => u.curp)), [usaerAlumnos]);

  const alumGrupo = useMemo(() => activos.filter(a => `${a.grado}${a.grupo}` === grupo), [activos, grupo]);
  const diaData   = asistencias[fecha] || {};
  const docente   = (catalogs.usuarios || []).find(u => u.grupo === grupo);

  const toggle = mat => {
    if (soloLectura) return;
    const cur = diaData[mat] || "A";
    const nxt = cur === "A" ? "P" : cur === "P" ? "J" : "A";
    setAsistencias(p => ({ ...p, [fecha]: { ...diaData, [mat]: nxt } }));
  };
  const marcarTodos = val => {
    if (soloLectura) return;
    const n = { ...diaData };
    alumGrupo.forEach(a => { n[a.matricula] = val; });
    setAsistencias(p => ({ ...p, [fecha]: n }));
  };

  const P   = alumGrupo.filter(a => diaData[a.matricula] === "P").length;
  const J   = alumGrupo.filter(a => diaData[a.matricula] === "J").length;
  const A   = alumGrupo.length - P - J;
  const pct = alumGrupo.length ? Math.round(P / alumGrupo.length * 100) : 0;

  const semana = () => {
    const d = new Date(fecha + "T12:00"), l = new Date(d);
    l.setDate(d.getDate() - ((d.getDay() || 7) - 1));
    return Array.from({ length: 5 }, (_, i) => { const x = new Date(l); x.setDate(l.getDate() + i); return x.toISOString().slice(0, 10); });
  };

  const exportar = () => {
    const rows = [["Alumno","CURP","Sexo","Fecha","Estado"]];
    alumGrupo.forEach(a => rows.push([nombreCompleto(a), a.curp, a.sexo, fecha, diaData[a.matricula] || "—"]));
    exportXLSX([{ name: `Asist_${grupo}_${fecha}`, data: rows, cols:[30,20,6,12,8] }], `Asistencia_${grupo}_${fecha}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo={`ASISTENCIA — GRUPO ${grupo} — ${fecha}`} ciclo={ciclo} grupo={grupo} docente={docente?.nombre} />
      <PageTitle icon="📅" title="Asistencia">
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>

      <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <input type="date" className="sel" value={fecha} onChange={e => setFecha(e.target.value)} />
        {!grupoFijo ? (
          <select className="sel" value={grupo} onChange={e => setGrupo(e.target.value)}>
            {grupos.map(g => {
              const doc = (catalogs.usuarios || []).find(u => u.id === g.docenteId);
              return <option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}{doc ? ` — ${doc.nombre.split(" ")[0]}` : ""}</option>;
            })}
          </select>
        ) : <span style={{ fontWeight: 700, color: C.p1 }}>Grupo {grupoFijo}</span>}
        <div style={{ display: "flex", gap: 4, marginLeft: "auto" }}>
          {[["diario","📋 Diaria"],["semanal","📊 Semanal"]].map(([id, lb]) => (
            <button key={id} className={`btn btn-sm ${tab === id ? "btn-p" : "btn-gray"}`} onClick={() => setTab(id)}>{lb}</button>
          ))}
        </div>
      </div>

      {tab === "diario" && (
        <>
          <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
            {[[`✅ P: ${P}`, pct >= 90 ? C.s1 : pct >= 75 ? C.w1 : C.d1],
              [`❌ A: ${A}`, C.d2], [`📋 J: ${J}`, C.w1],
              [`📊 ${pct}%`, pct >= 90 ? C.s1 : pct >= 75 ? C.w1 : C.d1]
            ].map(([lb, co]) => (
              <div key={lb} style={{ background: "#fff", borderRadius: 9, padding: "8px 16px", color: co, fontWeight: 700, fontSize: 13, boxShadow: "0 2px 6px rgba(0,0,0,.07)" }}>{lb}</div>
            ))}
          </div>
          {!soloLectura && (
            <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 9, flexWrap: "wrap" }}>
              <Btn cls="btn-g btn-sm" onClick={() => marcarTodos("P")}>✅ Todos Presentes</Btn>
              <Btn cls="btn-r btn-sm" onClick={() => marcarTodos("A")}>❌ Todos Ausentes</Btn>
            </div>
          )}
          <Card>
            <div style={{ overflowX: "auto" }}>
              <table className="tbl tbl-alt">
                <thead><tr>
                  <th style={{ width: 32, textAlign: "center" }}>#</th>
                  <th>Nombre Completo</th>
                  <th style={{ textAlign: "center", width: 40 }}>Sx</th>
                  <th style={{ textAlign: "center", width: 90 }}>Asistencia</th>
                </tr></thead>
                <tbody>
                  {alumGrupo.map((a, i) => {
                    const est = diaData[a.matricula] || "A";
                    return (
                      <tr key={a.matricula} onClick={() => toggle(a.matricula)} style={{ cursor: soloLectura ? "default" : "pointer", WebkitUserSelect: "none", userSelect: "none" }}>
                        <td style={{ textAlign: "center", color: C.muted, fontSize: 11 }}>{i + 1}</td>
                        <td>
                          <span style={{ fontWeight: 600 }}>{nombreCompleto(a)}</span>
                          {usaerSet.has(a.curp) && <> <span className="chip chip-u" style={{ fontSize: 9 }}>♿</span></>}
                        </td>
                        <td style={{ textAlign: "center", fontSize: 12 }}>{a.sexo === "HOMBRE" ? "H" : "M"}</td>
                        <td style={{ textAlign: "center", padding: "5px" }}>
                          <button className={`ast-${est}`}>{est}</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {!soloLectura && (
              <div className="no-print" style={{ padding: "9px 14px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <Btn cls="btn-p" onClick={() => notify("Asistencia guardada ✅")}>💾 Guardar</Btn>
                <span style={{ fontSize: 11, color: C.muted }}>Toca la fila: A → P → J → A</span>
              </div>
            )}
          </Card>
        </>
      )}

      {tab === "semanal" && (
        <Card style={{ padding: 14 }}>
          <h3 style={{ color: C.p1, margin: "0 0 12px", fontSize: 14 }}>Semana del {semana()[0]} — Grupo {grupo}</h3>
          <div style={{ overflowX: "auto" }}>
            <table className="tbl tbl-alt" style={{ fontSize: 11.5 }}>
              <thead><tr>
                <th style={{ minWidth: 130 }}>Alumno</th>
                {semana().map(d => {
                  const nm = ["L","M","X","J","V"][new Date(d + "T12:00").getDay() - 1] || "";
                  return <th key={d} style={{ textAlign: "center", minWidth: 36 }}>{nm}<br /><span style={{ fontWeight: 400, fontSize: 9 }}>{d.slice(5)}</span></th>;
                })}
                <th style={{ textAlign: "center", width: 42 }}>%</th>
              </tr></thead>
              <tbody>
                {alumGrupo.map(a => {
                  const dias = semana(); const nP = dias.filter(d => (asistencias[d] || {})[a.matricula] === "P").length;
                  return (
                    <tr key={a.matricula}>
                      <td style={{ fontWeight: 600 }}>{a.primer_apellido} {a.nombre}{usaerSet.has(a.curp) && <span className="chip chip-u" style={{ fontSize: 9, marginLeft: 4 }}>♿</span>}</td>
                      {dias.map(d => { const e = (asistencias[d] || {})[a.matricula]; return <td key={d} style={{ textAlign: "center", background: e === "P" ? "#dcfce7" : e === "J" ? "#fef3c7" : e === "A" ? "#fee2e2" : "#f8fafc", color: e === "P" ? "#166534" : e === "J" ? "#92400e" : e === "A" ? "#991b1b" : C.muted, fontWeight: 700, fontSize: 11 }}>{e || "—"}</td>; })}
                      <td style={{ textAlign: "center", fontWeight: 700, color: nP >= 4 ? C.s1 : nP >= 3 ? C.w1 : C.d1 }}>{Math.round(nP / 5 * 100)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

// MÓDULO: CALIFICACIONES
// ══════════════════════════════════════════════════════════════════
function ModCalificaciones({ activos, calificaciones, setCalificaciones, efCals, notify, addBitacora, ciclo, grupos, catalogs, usaerAlumnos, grupoFijo, soloLectura }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const [grupo,  setGrupo]  = useState(grupoFijo || (grupos[0] ? grupoKey(grupos[0]) : "1A"));
  const [periodo, setPeriodo] = useState("1");
  const usaerSet = useMemo(() => new Set((usaerAlumnos || []).map(u => u.curp)), [usaerAlumnos]);

  const alumGrupo = useMemo(() => activos.filter(a => `${a.grado}${a.grupo}` === grupo), [activos, grupo]);
  const key       = `${grupo}-P${periodo}`;
  const cals      = calificaciones[key] || {};
  const ef        = efCals[key] || {};
  const docente   = (catalogs.usuarios || []).find(u => u.grupo === grupo);

  const setCal = (mat, mi, val) => {
    if (soloLectura) return;
    if (val === "") {
      setCalificaciones(p => { const n = { ...p }; if (n[key]?.[mat]) { const m = { ...n[key][mat] }; delete m[mi]; n[key] = { ...n[key], [mat]: m }; } return n; });
      return;
    }
    const v = parseFloat(val);
    if (isNaN(v) || v < 0 || v > 10) return;
    setCalificaciones(p => ({ ...p, [key]: { ...cals, [mat]: { ...(cals[mat] || {}), [mi]: v } } }));
  };

  const getProm = mat => {
    const vals = materias.map((m, mi) => {
      if (!m.tieneEF) { const v = (cals[mat] || {})[mi]; return v !== undefined ? +v : null; }
      return calHumano((cals[mat] || {})[mi], (ef[mat] || {})[mi], m.pctEF);
    }).filter(v => v !== null && v !== undefined);
    return vals.length ? promedioArr(vals) : null;
  };

  const rezago = alumGrupo.filter(a => { const p = getProm(a.matricula); return p !== null && p < 6; });

  const exportar = () => {
    const hdr = ["#","Alumno","CURP",...materias.map(m => m.nombre),"Promedio"];
    const rows = [hdr];
    alumGrupo.forEach((a, i) => {
      const cs = materias.map((m, mi) => !m.tieneEF ? (cals[a.matricula]||{})[mi] ?? "" : (calHumano((cals[a.matricula]||{})[mi], (ef[a.matricula]||{})[mi], m.pctEF) ?? ""));
      rows.push([i+1, nombreCompleto(a), a.curp, ...cs, getProm(a.matricula) ?? ""]);
    });
    exportXLSX([{ name: `Cals_${grupo}_P${periodo}`, data: rows, cols:[4,28,20,...materias.map(()=>12),8] }], `Calificaciones_${grupo}_P${periodo}_${ciclo}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo={`CALIFICACIONES — GRUPO ${grupo} — PERIODO ${periodo}`} ciclo={ciclo} grupo={grupo} docente={docente?.nombre} />
      <PageTitle icon="📝" title="Calificaciones">
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>

      <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        {!grupoFijo ? (
          <select className="sel" value={grupo} onChange={e => setGrupo(e.target.value)}>
            {grupos.map(g => { const doc = (catalogs.usuarios||[]).find(u=>u.id===g.docenteId); return <option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}{doc ? ` — ${doc.nombre.split(" ")[0]}`:"" }</option>; })}
          </select>
        ) : <span style={{ fontWeight: 700, color: C.p1 }}>Grupo {grupoFijo}</span>}
        <div style={{ display: "flex", gap: 4 }}>
          {["1","2","3"].map(p => <button key={p} className={`btn btn-sm ${periodo===p?"btn-p":"btn-gray"}`} onClick={() => setPeriodo(p)}>P{p}</button>)}
        </div>
      </div>

      {rezago.length > 0 && (
        <div className="alert-banner alert-r">
          <span style={{ fontSize: 20 }}>⚠️</span>
          <div><strong style={{ color: C.d1 }}>Rezago ({rezago.length}):</strong>
            <div style={{ fontSize: 12, marginTop: 2 }}>{rezago.map(a => `${a.primer_apellido} ${a.nombre} (${getProm(a.matricula)?.toFixed(1)})`).join(" · ")}</div>
          </div>
        </div>
      )}

      {materias.some(m => m.tieneEF) && (
        <div style={{ background:"#f5f3ff", borderRadius:9, padding:"8px 14px", marginBottom:10, fontSize:12, border:"1px solid #ddd6fe" }}>
          <strong style={{ color: C.v1 }}>⚽ Ed. Física:</strong> contribuye {materias.find(m=>m.tieneEF)?.pctEF}% al campo <em>{materias.find(m=>m.tieneEF)?.nombre}</em>. La nota que ingresa el maestro es el {100-(materias.find(m=>m.tieneEF)?.pctEF||0)}% restante.
        </div>
      )}

      <Card>
        <div style={{ overflowX: "auto" }}>
          <table className="tbl tbl-alt" style={{ fontSize: 12 }}>
            <thead>
              <tr>
                <th style={{ width: 28, textAlign: "center" }}>#</th>
                <th style={{ minWidth: 140 }}>Alumno</th>
                {materias.map((m, i) => (
                  <th key={i} style={{ textAlign: "center", minWidth: 62, fontSize: 10 }}>
                    {m.nombre.split(" ").slice(0, 2).join(" ")}
                    {m.tieneEF && <><br /><span style={{ color: "#c4b5fd", fontSize: 9 }}>c/EF {m.pctEF}%</span></>}
                  </th>
                ))}
                <th style={{ textAlign: "center", minWidth: 54 }}>Prom.</th>
              </tr>
            </thead>
            <tbody>
              {alumGrupo.map((a, i) => {
                const pr = getProm(a.matricula); const enR = pr !== null && pr < 6;
                return (
                  <tr key={a.matricula} style={enR ? { background: "#fff5f5" } : {}}>
                    <td style={{ textAlign: "center", color: C.muted, fontSize: 11 }}>{i + 1}</td>
                    <td>
                      <span style={{ fontWeight: 600 }}>{a.primer_apellido} {a.nombre}</span>
                      {enR && <span className="chip chip-r" style={{ marginLeft: 5, fontSize: 9 }}>Rez.</span>}
                      {usaerSet.has(a.curp) && <span className="chip chip-u" style={{ marginLeft: 4, fontSize: 9 }}>♿</span>}
                    </td>
                    {materias.map((m, mi) => {
                      if (!m.tieneEF) {
                        const v = (cals[a.matricula] || {})[mi];
                        const cls = v !== undefined ? (v < 6 ? "cal-bajo" : v >= 9 ? "cal-alto" : "cal-medio") : "";
                        return (
                          <td key={mi} style={{ padding: "4px", textAlign: "center" }}>
                            <input type="number" min="0" max="10" step="0.5"
                              className={`cal-inp ${cls}`} readOnly={soloLectura}
                              value={v !== undefined ? v : ""} onChange={e => setCal(a.matricula, mi, e.target.value)} />
                          </td>
                        );
                      }
                      const vM = (cals[a.matricula] || {})[mi]; const vE = (ef[a.matricula] || {})[mi];
                      const vF = calHumano(vM, vE, m.pctEF);
                      const cls = vF !== null ? (vF < 6 ? "cal-bajo" : vF >= 9 ? "cal-alto" : "cal-medio") : "";
                      return (
                        <td key={mi} style={{ padding: "4px", textAlign: "center" }}>
                          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                            <input type="number" min="0" max="10" step="0.5"
                              className={`cal-inp ${cls}`} readOnly={soloLectura}
                              value={vM !== undefined ? vM : ""} onChange={e => setCal(a.matricula, mi, e.target.value)}
                              title={`Maestro:${vM??'—'} | EF:${vE??'—'} | Final:${vF??'—'}`} />
                            {vE !== undefined && <span style={{ fontSize: 9, color: C.v2 }}>⚽{vE}</span>}
                            {vF !== null && <span style={{ fontSize: 9, fontWeight: 700, color: vF<6?C.d1:vF>=9?C.s1:C.text }}>={vF}</span>}
                          </div>
                        </td>
                      );
                    })}
                    <td style={{ textAlign: "center", fontWeight: 800, fontSize: 14, color: enR ? C.d1 : pr !== null && pr >= 9 ? C.s1 : C.text }}>
                      {pr !== null ? pr.toFixed(1) : "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {!soloLectura && (
          <div className="no-print" style={{ padding: "9px 14px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <Btn cls="btn-p" onClick={() => { addBitacora("GUARDAR_CALS", `${grupo} P${periodo}`); notify("Calificaciones guardadas ✅"); }}>💾 Guardar</Btn>
            <span style={{ fontSize: 11, color: C.muted }}>🔴 &lt;6.0 · 🟡 6–8.9 · 🟢 ≥9.0 · Promedio ponderado con EF</span>
          </div>
        )}
      </Card>
    </div>
  );
}

// MÓDULO: EF CALIFICACIONES
// ══════════════════════════════════════════════════════════════════
function ModEFCalificaciones({ activos, efCals, setEfCals, notify, addBitacora, ciclo, grupos, catalogs }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const efMat    = materias.find(m => m.tieneEF);
  const efIdx    = efMat ? materias.indexOf(efMat) : MAT_EF_IDX;

  const [grupo, setGrupo]   = useState(grupos[0] ? grupoKey(grupos[0]) : "1A");
  const [periodo, setPer]   = useState("1");

  const alumGrupo = useMemo(() => activos.filter(a => `${a.grado}${a.grupo}` === grupo), [activos, grupo]);
  const key  = `${grupo}-P${periodo}`;
  const cals = efCals[key] || {};

  const setCal = (mat, val) => {
    if (val === "") { setEfCals(p => { const n = { ...p }; if (n[key]?.[mat]) { const m = { ...n[key][mat] }; delete m[efIdx]; n[key] = { ...n[key], [mat]: m }; } return n; }); return; }
    const v = parseFloat(val); if (isNaN(v) || v < 0 || v > 10) return;
    setEfCals(p => ({ ...p, [key]: { ...cals, [mat]: { ...(cals[mat] || {}), [efIdx]: v } } }));
  };

  const exportar = () => {
    const rows = [["#","Alumno","CURP","Sexo",`Calif. EF — ${efMat?.nombre||"Campo EF"}`]];
    alumGrupo.forEach((a,i) => rows.push([i+1, nombreCompleto(a), a.curp, a.sexo, (cals[a.matricula]||{})[efIdx]??""]));
    exportXLSX([{ name:`EF_${grupo}_P${periodo}`, data:rows, cols:[4,28,20,6,14] }], `EF_${grupo}_P${periodo}_${ciclo}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo={`EDUCACIÓN FÍSICA — ${grupo} — PERIODO ${periodo}`} ciclo={ciclo} grupo={grupo} docente="Maestro(a) de Educación Física" />
      <PageTitle icon="⚽" title="Calificaciones — Educación Física">
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>

      <div style={{ background: "#f5f3ff", borderRadius: 10, padding: "10px 16px", marginBottom: 12, fontSize: 13, border: "1px solid #ddd6fe" }}>
        <strong style={{ color: C.v1 }}>⚽ Educación Física</strong> — Campo: <em>{efMat?.nombre}</em> · Tu calificación representa el <strong>{efMat?.pctEF || 33}%</strong>. El resto ({100-(efMat?.pctEF||33)}%) lo captura el maestro titular.
      </div>

      <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <select className="sel" value={grupo} onChange={e => setGrupo(e.target.value)}>
          {grupos.map(g => <option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}</option>)}
        </select>
        <div style={{ display: "flex", gap: 4 }}>
          {["1","2","3"].map(p => <button key={p} className={`btn btn-sm ${periodo===p?"btn-v":"btn-gray"}`} onClick={() => setPer(p)}>Periodo {p}</button>)}
        </div>
      </div>

      <Card>
        <div style={{ overflowX: "auto" }}>
          <table className="tbl tbl-alt">
            <thead><tr>
              <th style={{ width: 30, textAlign: "center" }}>#</th>
              <th>Alumno</th>
              <th style={{ textAlign: "center", width: 50 }}>Sx</th>
              <th style={{ textAlign: "center", minWidth: 100 }}>⚽ Calificación EF<br /><span style={{ fontWeight: 400, fontSize: 9.5, color: "#c4b5fd" }}>{efMat?.pctEF||33}% del campo</span></th>
            </tr></thead>
            <tbody>
              {alumGrupo.map((a, i) => {
                const v = (cals[a.matricula] || {})[efIdx];
                const cls = v !== undefined ? (v < 6 ? "cal-bajo" : v >= 9 ? "cal-alto" : "cal-medio") : "";
                return (
                  <tr key={a.matricula}>
                    <td style={{ textAlign: "center", color: C.muted, fontSize: 11 }}>{i + 1}</td>
                    <td style={{ fontWeight: 600 }}>{nombreCompleto(a)}</td>
                    <td style={{ textAlign: "center" }}>{a.sexo === "HOMBRE" ? "H" : "M"}</td>
                    <td style={{ textAlign: "center", padding: "5px 8px" }}>
                      <input type="number" min="0" max="10" step="0.5"
                        className={`cal-inp cal-ef ${cls}`} value={v !== undefined ? v : ""}
                        onChange={e => setCal(a.matricula, e.target.value)} />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="no-print" style={{ padding: "9px 14px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <Btn cls="btn-v" onClick={() => { addBitacora("GUARDAR_EF", `${grupo} P${periodo}`); notify("Calificaciones EF guardadas ✅"); }}>💾 Guardar EF</Btn>
          <span style={{ fontSize: 11, color: C.muted }}>0.0 – 10.0</span>
        </div>
      </Card>
    </div>
  );
}

function ModEFReporte({ activos, efCals, ciclo, grupos, catalogs }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const efMat  = materias.find(m => m.tieneEF);
  const efIdx  = efMat ? materias.indexOf(efMat) : MAT_EF_IDX;
  const [grupo, setGrupo] = useState(grupos[0] ? grupoKey(grupos[0]) : "1A");
  const alumGrupo = useMemo(() => activos.filter(a => `${a.grado}${a.grupo}` === grupo), [activos, grupo]);

  return (
    <div className="fade-up">
      <CabImpresion titulo={`REPORTE EF — GRUPO ${grupo}`} ciclo={ciclo} />
      <PageTitle icon="📈" title="Mi Reporte — Educación Física"><PrintBtn /></PageTitle>
      <select className="sel no-print" value={grupo} onChange={e => setGrupo(e.target.value)} style={{ marginBottom: 12 }}>
        {grupos.map(g => <option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}</option>)}
      </select>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 14 }}>
        {["1","2","3"].map(p => {
          const key = `${grupo}-P${p}`; const ec = efCals[key] || {};
          const vals = alumGrupo.map(a => (ec[a.matricula] || {})[efIdx]).filter(v => v !== undefined);
          return (
            <div key={p} className="stat-card" style={{ borderTop: `4px solid ${C.v1}` }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.muted }}>Periodo {p}</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: C.v1 }}>{vals.length ? promedioArr(vals)?.toFixed(1) : "—"}</div>
              <div style={{ fontSize: 11, color: C.muted }}>{vals.length} calificados</div>
            </div>
          );
        })}
      </div>
      {["1","2","3"].map(p => {
        const key = `${grupo}-P${p}`; const ec = efCals[key] || {};
        const has = alumGrupo.some(a => (ec[a.matricula] || {})[efIdx] !== undefined);
        if (!has) return null;
        return (
          <Card key={p} style={{ marginBottom: 12 }}>
            <CardHdr style={{ background: "#f5f3ff" }}><h3 style={{ margin: 0, fontSize: 13, color: C.v1 }}>⚽ Periodo {p} — Grupo {grupo}</h3></CardHdr>
            <div style={{ overflowX: "auto" }}>
              <table className="tbl tbl-alt" style={{ fontSize: 12 }}>
                <thead><tr><th style={{ minWidth: 130 }}>Alumno</th><th style={{ textAlign: "center" }}>Calif. EF</th><th style={{ textAlign: "center" }}>Nivel</th></tr></thead>
                <tbody>
                  {alumGrupo.map(a => {
                    const v = (ec[a.matricula] || {})[efIdx];
                    return (
                      <tr key={a.matricula}>
                        <td style={{ fontWeight: 600 }}>{a.primer_apellido} {a.nombre}</td>
                        <td style={{ textAlign: "center", fontWeight: 800, fontSize: 14, color: v !== undefined ? (v < 6 ? C.d1 : v >= 9 ? C.s1 : C.text) : C.muted }}>{v !== undefined ? v : "—"}</td>
                        <td style={{ textAlign: "center" }}>{v !== undefined && <span className={`chip ${v < 6 ? "chip-r" : v >= 9 ? "chip-g" : "chip-b"}`}>{v < 6 ? "Bajo" : v >= 9 ? "Excelente" : "Regular"}</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        );
      })}
    </div>
  );
}
