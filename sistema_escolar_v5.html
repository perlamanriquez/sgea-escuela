// MÓDULO: CATÁLOGOS — usuarios, grupos, materias
// ══════════════════════════════════════════════════════════════════
function ModCatalogos({ catalogs, setCatalogos, notify, addBitacora, usuario }) {
  const [tab, setTab] = useState("grupos");

  return (
    <div className="fade-up">
      <PageTitle icon="⚙️" title="Catálogos del Sistema" />
      <div className="no-print" style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
        {[["grupos","🏫 Grupos"],["usuarios","👤 Usuarios"],["materias","📚 Materias"]].map(([id,lb]) => (
          <button key={id} className={`btn ${tab===id?"btn-dark":"btn-gray"}`} onClick={() => setTab(id)}>{lb}</button>
        ))}
      </div>
      {tab === "grupos"   && <CatGrupos   catalogs={catalogs} setCatalogos={setCatalogos} notify={notify} addBitacora={addBitacora} />}
      {tab === "usuarios" && <CatUsuarios catalogs={catalogs} setCatalogos={setCatalogos} notify={notify} addBitacora={addBitacora} usuario={usuario} />}
      {tab === "materias" && <CatMaterias catalogs={catalogs} setCatalogos={setCatalogos} notify={notify} />}
    </div>
  );
}

// ── Catálogo: Grupos ─────────────────────────────────────────────
function CatGrupos({ catalogs, setCatalogos, notify, addBitacora }) {
  const grupos   = catalogs.grupos   || GRUPOS_DEFAULT;
  const usuarios = catalogs.usuarios || USUARIOS_DEFAULT;
  const [editId, setEditId]   = useState(null);
  const [nuevo,  setNuevo]    = useState({ grado: "1", letra: "A", docenteId: "", turno: "M" });
  const [addOpen, setAddOpen] = useState(false);

  const maestros = usuarios.filter(u => u.rol === "maestro");

  const guardar = (id, campo, val) => {
    setCatalogos(p => ({
      ...p, grupos: p.grupos.map(g => g.id === id ? { ...g, [campo]: val } : g)
    }));
  };
  const asignarDocente = (id, docenteId) => {
    // Si el docente ya tiene grupo, removerlo
    setCatalogos(p => {
      const grps = p.grupos.map(g => {
        if (g.id === id) return { ...g, docenteId: docenteId || null };
        if (docenteId && g.docenteId === docenteId && g.id !== id) return { ...g, docenteId: null };
        return g;
      });
      // Actualizar campo grupo en usuario
      const usrs = p.usuarios.map(u => {
        if (u.id === docenteId) return { ...u, grupo: grupoKey(p.grupos.find(g => g.id === id) || {}) };
        if (p.grupos.find(g => g.id === id)?.docenteId === u.id) return { ...u, grupo: null };
        return u;
      });
      return { ...p, grupos: grps, usuarios: usrs };
    });
    addBitacora("ASIGNAR_DOCENTE", `Grupo ${id} → ${docenteId || "Sin docente"}`);
    notify("Docente asignado ✅");
  };

  const agregarGrupo = () => {
    const gk = `${nuevo.grado}${nuevo.letra}`;
    if ((catalogs.grupos||[]).find(g => grupoKey(g) === gk)) { notify("Grupo ya existe", "err"); return; }
    const ng = { id: "g" + uid(), grado: nuevo.grado, letra: nuevo.letra.toUpperCase(), docenteId: null, turno: nuevo.turno };
    setCatalogos(p => ({ ...p, grupos: [...p.grupos, ng] }));
    addBitacora("NUEVO_GRUPO", `Grupo ${gk}`);
    setAddOpen(false); notify("Grupo agregado ✅");
  };

  const eliminarGrupo = id => {
    const g = grupos.find(x => x.id === id);
    setCatalogos(p => ({ ...p, grupos: p.grupos.filter(g2 => g2.id !== id) }));
    addBitacora("ELIMINAR_GRUPO", grupoKey(g));
    notify("Grupo eliminado");
  };

  return (
    <Card>
      <CardHdr>
        <h3 style={{ margin: 0, fontSize: 14, color: C.p1 }}>🏫 Grupos ({grupos.length})</h3>
        <Btn cls="btn-g btn-sm" onClick={() => setAddOpen(true)}>➕ Nuevo Grupo</Btn>
      </CardHdr>
      <div style={{ overflowX: "auto" }}>
        <table className="tbl tbl-alt">
          <thead><tr>{["Grupo","Grado","Letra","Docente Asignado","Turno",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {grupos.sort((a,b) => grupoKey(a).localeCompare(grupoKey(b))).map(g => {
              const doc = usuarios.find(u => u.id === g.docenteId);
              return (
                <tr key={g.id}>
                  <td><span className="chip chip-b">{grupoKey(g)}</span></td>
                  <td style={{ textAlign: "center" }}>{g.grado}°</td>
                  <td style={{ textAlign: "center" }}>{g.letra}</td>
                  <td>
                    {editId === g.id ? (
                      <div style={{ display: "flex", gap: 6 }}>
                        <select className="sel" style={{ flex: 1, padding: "5px 8px", fontSize: 12 }}
                          defaultValue={g.docenteId || ""} id={`doc-${g.id}`}>
                          <option value="">— Sin docente —</option>
                          {maestros.map(u => <option key={u.id} value={u.id}>{u.nombre}</option>)}
                        </select>
                        <Btn cls="btn-g btn-xs" onClick={() => { asignarDocente(g.id, document.getElementById(`doc-${g.id}`).value || null); setEditId(null); }}>✓</Btn>
                        <Btn cls="btn-gray btn-xs" onClick={() => setEditId(null)}>✕</Btn>
                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <span style={{ fontSize: 12, color: doc ? C.text : C.d1, fontStyle: doc ? "normal" : "italic" }}>
                          {doc ? doc.nombre : "⚠️ Sin docente"}
                        </span>
                        <Btn cls="btn-gray btn-xs" onClick={() => setEditId(g.id)}>✏️</Btn>
                      </div>
                    )}
                  </td>
                  <td style={{ textAlign: "center" }}>
                    <span className="chip chip-gray">{g.turno === "M" ? "Matutino" : "Vespertino"}</span>
                  </td>
                  <td style={{ textAlign: "center" }}>
                    <Btn cls="btn-r btn-xs" onClick={() => eliminarGrupo(g.id)} title="Eliminar grupo">🗑️</Btn>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {addOpen && (
        <div className="modal-bg" onClick={() => setAddOpen(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 380 }}>
            <div className="modal-hdr"><span className="modal-title">➕ Nuevo Grupo</span><button className="modal-close" onClick={() => setAddOpen(false)}>✕</button></div>
            <FormGrid>
              <Field label="Grado">
                <select className="sel" style={{ width:"100%" }} value={nuevo.grado} onChange={e => setNuevo(p=>({...p,grado:e.target.value}))}>
                  {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}°</option>)}
                </select>
              </Field>
              <Field label="Letra del Grupo">
                <input className="inp" value={nuevo.letra} maxLength={2}
                  onChange={e => setNuevo(p=>({...p,letra:e.target.value.toUpperCase()}))} placeholder="A, B, C…" />
              </Field>
              <Field label="Turno">
                <select className="sel" style={{ width:"100%" }} value={nuevo.turno} onChange={e => setNuevo(p=>({...p,turno:e.target.value}))}>
                  <option value="M">Matutino</option><option value="V">Vespertino</option>
                </select>
              </Field>
            </FormGrid>
            <div style={{ display:"flex",gap:8 }}>
              <Btn cls="btn-g" onClick={agregarGrupo}>💾 Crear Grupo</Btn>
              <Btn cls="btn-gray" onClick={() => setAddOpen(false)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}
    </Card>
  );
}

// ── Catálogo: Usuarios ───────────────────────────────────────────
function CatUsuarios({ catalogs, setCatalogos, notify, addBitacora, usuario: usuarioActual }) {
  const usuarios = catalogs.usuarios || USUARIOS_DEFAULT;
  const [editId, setEditId] = useState(null);
  const [newPass, setNP]    = useState({});
  const [addOpen, setAdd]   = useState(false);
  const [nuevo, setNuevo]   = useState({ user:"", pass:"", nombre:"", rol:"maestro", grupo:null });

  const guardarCampo = (id, campo, val) => {
    setCatalogos(p => ({ ...p, usuarios: p.usuarios.map(u => u.id === id ? { ...u, [campo]: val } : u) }));
  };

  const cambiarPass = async id => {
    const np = newPass[id]; if (!np || np.length < 4) { notify("Mínimo 4 caracteres", "err"); return; }
    const hashed = await hashPass(np);
    setCatalogos(p => ({ ...p, usuarios: p.usuarios.map(u => u.id === id ? { ...u, pass: hashed } : u) }));
    addBitacora("CAMBIO_PASS", `Usuario ${usuarios.find(u=>u.id===id)?.user}`);
    setNP(p => ({ ...p, [id]: "" })); notify("Contraseña actualizada ✅");
  };

  const agregarUsuario = async () => {
    if (!nuevo.user.trim() || !nuevo.pass.trim() || !nuevo.nombre.trim()) { notify("Complete todos los campos", "err"); return; }
    if (usuarios.find(u => u.user === nuevo.user.trim())) { notify("Usuario ya existe", "err"); return; }
    const hashed = await hashPass(nuevo.pass.trim());
    const nu = { id: "u" + uid(), user: nuevo.user.trim().toLowerCase(), pass: hashed, nombre: nuevo.nombre.trim(), rol: nuevo.rol, grupo: nuevo.grupo || null };
    setCatalogos(p => ({ ...p, usuarios: [...p.usuarios, nu] }));
    addBitacora("NUEVO_USUARIO", `${nu.user} — ${nu.rol}`);
    setAdd(false); setNuevo({ user:"", pass:"", nombre:"", rol:"maestro", grupo:null }); notify("Usuario creado ✅");
  };

  const eliminarUsuario = id => {
    if (id === usuarioActual.id) { notify("No puede eliminarse a sí mismo", "err"); return; }
    setCatalogos(p => ({ ...p, usuarios: p.usuarios.filter(u => u.id !== id) }));
    notify("Usuario eliminado");
  };

  return (
    <Card>
      <CardHdr>
        <h3 style={{ margin: 0, fontSize: 14, color: C.p1 }}>👤 Usuarios ({usuarios.length})</h3>
        <Btn cls="btn-g btn-sm" onClick={() => setAdd(true)}>➕ Nuevo Usuario</Btn>
      </CardHdr>
      <div style={{ overflowX: "auto" }}>
        <table className="tbl tbl-alt" style={{ fontSize: 12 }}>
          <thead><tr>{["Usuario","Nombre Completo","Rol","Grupo","Nueva Contraseña",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {usuarios.map(u => (
              <tr key={u.id}>
                <td style={{ fontFamily: "monospace", fontWeight: 700 }}>{u.user}</td>
                <td>
                  {editId === u.id ? (
                    <div style={{ display: "flex", gap: 6 }}>
                      <input className="inp" style={{ fontSize: 12, padding: "5px 8px" }} defaultValue={u.nombre} id={`nm-${u.id}`} />
                      <Btn cls="btn-g btn-xs" onClick={() => { guardarCampo(u.id, "nombre", document.getElementById(`nm-${u.id}`).value); setEditId(null); notify("Nombre actualizado"); }}>✓</Btn>
                      <Btn cls="btn-gray btn-xs" onClick={() => setEditId(null)}>✕</Btn>
                    </div>
                  ) : (
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span>{u.nombre}</span>
                      <Btn cls="btn-gray btn-xs" onClick={() => setEditId(u.id)}>✏️</Btn>
                    </div>
                  )}
                </td>
                <td><RolTag rol={u.rol} /></td>
                <td style={{ textAlign: "center" }}>{u.grupo ? <span className="chip chip-b">{u.grupo}</span> : <span style={{ color: C.muted }}>—</span>}</td>
                <td>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <input className="inp" style={{ width: 120, padding: "5px 8px", fontSize: 12 }} type="password"
                      placeholder="Nueva contraseña" value={newPass[u.id] || ""}
                      onChange={e => setNP(p => ({ ...p, [u.id]: e.target.value }))} />
                    <Btn cls="btn-p btn-xs" onClick={() => cambiarPass(u.id)}>💾</Btn>
                  </div>
                </td>
                <td style={{ textAlign: "center" }}>
                  {u.id !== usuarioActual.id && <Btn cls="btn-r btn-xs" onClick={() => eliminarUsuario(u.id)}>🗑️</Btn>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {addOpen && (
        <div className="modal-bg" onClick={() => setAdd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 460 }}>
            <div className="modal-hdr"><span className="modal-title">➕ Nuevo Usuario</span><button className="modal-close" onClick={() => setAdd(false)}>✕</button></div>
            <FormGrid>
              <Field label="Usuario *"><input className="inp" value={nuevo.user} onChange={e => setNuevo(p=>({...p,user:e.target.value.toLowerCase()}))} placeholder="nombre.apellido" /></Field>
              <Field label="Contraseña inicial *"><input className="inp" type="password" value={nuevo.pass} onChange={e => setNuevo(p=>({...p,pass:e.target.value}))} /></Field>
              <Field label="Nombre Completo *"><input className="inp" value={nuevo.nombre} onChange={e => setNuevo(p=>({...p,nombre:e.target.value}))} /></Field>
              <Field label="Rol">
                <select className="sel" style={{ width:"100%" }} value={nuevo.rol} onChange={e => setNuevo(p=>({...p,rol:e.target.value}))}>
                  {Object.entries(ROLES_LABELS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                </select>
              </Field>
              {nuevo.rol === "maestro" && (
                <Field label="Grupo asignado">
                  <select className="sel" style={{ width:"100%" }} value={nuevo.grupo||""} onChange={e => setNuevo(p=>({...p,grupo:e.target.value||null}))}>
                    <option value="">— Sin grupo —</option>
                    {(catalogs.grupos||GRUPOS_DEFAULT).map(g => <option key={g.id} value={grupoKey(g)}>{grupoKey(g)}</option>)}
                  </select>
                </Field>
              )}
            </FormGrid>
            <div style={{ display:"flex",gap:8 }}>
              <Btn cls="btn-p" onClick={agregarUsuario}>💾 Crear Usuario</Btn>
              <Btn cls="btn-gray" onClick={() => setAdd(false)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}
    </Card>
  );
}

// ── Catálogo: Materias ────────────────────────────────────────────
function CatMaterias({ catalogs, setCatalogos, notify }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const upd = (id, campo, val) => setCatalogos(p => ({ ...p, materias: p.materias.map(m => m.id === id ? { ...m, [campo]: val } : m) }));

  return (
    <Card>
      <CardHdr><h3 style={{ margin: 0, fontSize: 14, color: C.p1 }}>📚 Campos Formativos NEM ({materias.length})</h3></CardHdr>
      <div style={{ overflowX: "auto" }}>
        <table className="tbl tbl-alt" style={{ fontSize: 12 }}>
          <thead><tr>{["#","Campo Formativo","Tiene EF","% Ed. Física"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {materias.map((m, i) => (
              <tr key={m.id}>
                <td style={{ textAlign: "center", color: C.muted }}>{i + 1}</td>
                <td>
                  <input className="inp" style={{ fontSize: 12, padding: "5px 8px" }} value={m.nombre}
                    onChange={e => upd(m.id, "nombre", e.target.value)} />
                </td>
                <td style={{ textAlign: "center" }}>
                  <input type="checkbox" checked={m.tieneEF}
                    onChange={e => upd(m.id, "tieneEF", e.target.checked)}
                    style={{ width: 16, height: 16, cursor: "pointer" }} />
                </td>
                <td style={{ textAlign: "center" }}>
                  {m.tieneEF ? (
                    <input type="number" min="1" max="99" className="cal-inp cal-ef"
                      value={m.pctEF} onChange={e => upd(m.id, "pctEF", parseInt(e.target.value) || 0)} />
                  ) : <span style={{ color: C.muted }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ padding: "9px 14px", borderTop: `1px solid ${C.border}` }}>
        <Btn cls="btn-p" onClick={() => notify("Materias actualizadas ✅")}>💾 Guardar Cambios</Btn>
      </div>
    </Card>
  );
}

// MÓDULO: MI CUENTA (cambio de contraseña propio)
// ══════════════════════════════════════════════════════════════════
function ModMiCuenta({ usuario, catalogs, setCatalogos, notify, addBitacora }) {
  const [pass1, setP1] = useState(""); const [pass2, setP2] = useState("");
  const [err, setErr]  = useState("");

  const cambiar = async () => {
    if (!pass1 || pass1.length < 4) { setErr("Mínimo 4 caracteres"); return; }
    if (pass1 !== pass2) { setErr("Las contraseñas no coinciden"); return; }
    const hashed = await hashPass(pass1);
    setCatalogos(p => ({ ...p, usuarios: p.usuarios.map(u => u.id === usuario.id ? { ...u, pass: hashed } : u) }));
    addBitacora("CAMBIO_PASS_PROPIO", usuario.user);
    setP1(""); setP2(""); setErr(""); notify("Contraseña actualizada ✅");
  };

  return (
    <div className="fade-up">
      <PageTitle icon="🔑" title="Mi Cuenta" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))", gap: 14 }}>
        <Card style={{ padding: 20 }}>
          <h3 style={{ color: C.p1, margin: "0 0 16px", fontSize: 15 }}>👤 Datos de mi cuenta</h3>
          {[["Usuario", usuario.user], ["Nombre", usuario.nombre], ["Rol", ROLES_LABELS[usuario.rol] || usuario.rol], ["Grupo", usuario.grupo || "—"]].map(([k,v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}`, fontSize: 13 }}>
              <span style={{ fontWeight: 700, color: "#374151" }}>{k}</span>
              <span style={{ color: C.muted }}>{v}</span>
            </div>
          ))}
        </Card>
        <Card style={{ padding: 20 }}>
          <h3 style={{ color: C.p1, margin: "0 0 16px", fontSize: 15 }}>🔑 Cambiar Contraseña</h3>
          <Field label="Nueva contraseña">
            <input className="inp" type="password" value={pass1} onChange={e => { setP1(e.target.value); setErr(""); }} placeholder="Mínimo 4 caracteres" style={{ marginBottom: 10 }} />
          </Field>
          <Field label="Confirmar contraseña">
            <input className="inp" type="password" value={pass2} onChange={e => { setP2(e.target.value); setErr(""); }} placeholder="Repita la contraseña" style={{ marginBottom: 10 }} />
          </Field>
          {err && <div style={{ color: C.d1, fontSize: 12, fontWeight: 700, marginBottom: 8 }}>⚠️ {err}</div>}
          <Btn cls="btn-p" onClick={cambiar}>💾 Actualizar Contraseña</Btn>
        </Card>
      </div>
    </div>
  );
}

// MÓDULO: IMPORTAR / EXPORTAR
// ══════════════════════════════════════════════════════════════════
function ModImportExport({ estado, setEstado, activos, alumnos, movimientos, asistencias, calificaciones, efCals, usaerAlumnos, catalogs, ciclo, notify, addBitacora }) {
  const [tab, setTab] = useState("exportar");
  const [preview, setPreview]   = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);
  const jsonRef = useRef(null);

  // ── EXPORTACIONES EXCEL ──────────────────────────────────────
  const exportAlumnos = () => {
    const rows = [["#","Matrícula","Primer Apellido","Segundo Apellido","Nombre","CURP","F.Nacimiento","Sexo","Grado","Grupo","Estado","Becado","Tipo Beca","Turno"]];
    alumnos.forEach((a,i) => rows.push([i+1,a.matricula,a.primer_apellido,a.segundo_apellido,a.nombre,a.curp,fmtFecha(a.fecha_nac),a.sexo,a.grado,a.grupo,a.activo?"Activo":"Baja",a.becado?"Sí":"No",a.tipo_beca||"",a.turno||"M"]));
    exportXLSX([{name:"Alumnos",data:rows,cols:[4,12,16,16,16,20,12,8,4,4,8,6,22,6]}], `Alumnos_${ciclo}.xlsx`);
  };

  const exportUsuarios = () => {
    const rows = [["ID","Usuario","Nombre","Rol","Grupo"]];
    (catalogs.usuarios||[]).forEach(u => rows.push([u.id,u.user,u.nombre,ROLES_LABELS[u.rol]||u.rol,u.grupo||""]));
    exportXLSX([{name:"Usuarios",data:rows,cols:[10,16,32,20,6]}], `Usuarios_${ciclo}.xlsx`);
  };

  const exportGrupos = () => {
    const rows = [["Grupo","Grado","Letra","Docente","Turno"]];
    (catalogs.grupos||[]).sort((a,b)=>grupoKey(a).localeCompare(grupoKey(b))).forEach(g => {
      const doc = (catalogs.usuarios||[]).find(u=>u.id===g.docenteId);
      rows.push([grupoKey(g),g.grado,g.letra,doc?.nombre||"Sin docente",g.turno==="M"?"Matutino":"Vespertino"]);
    });
    exportXLSX([{name:"Grupos",data:rows,cols:[6,4,4,32,12]}], `Grupos_${ciclo}.xlsx`);
  };

  const exportCalificaciones = () => {
    const materias = catalogs.materias || MATERIAS_DEFAULT;
    const sheets = [];
    (catalogs.grupos||[]).forEach(g => {
      const gk = grupoKey(g);
      ["1","2","3"].forEach(p => {
        const key = `${gk}-P${p}`;
        const d = calificaciones[key]; const ef = efCals[key];
        if (!d && !ef) return;
        const al = activos.filter(a=>`${a.grado}${a.grupo}`===gk);
        if (!al.length) return;
        const hdr = ["#","Alumno","CURP",...materias.map(m=>m.nombre),"Promedio"];
        const rows = [hdr];
        al.forEach((a,i) => {
          const cs = materias.map((m,mi) => !m.tieneEF ? ((d||{})[a.matricula]||{})[mi]??"" : (calHumano(((d||{})[a.matricula]||{})[mi], ((ef||{})[a.matricula]||{})[mi], m.pctEF)??""));
          const pr = promedioArr(cs.filter(v=>v!==""));
          rows.push([i+1,nombreCompleto(a),a.curp,...cs,pr??""]);
        });
        sheets.push({name:`${gk}-P${p}`,data:rows,cols:[4,28,20,...materias.map(()=>14),8]});
      });
    });
    if (!sheets.length) { notify("Sin calificaciones registradas","warn"); return; }
    exportXLSX(sheets, `Calificaciones_${ciclo}.xlsx`);
    addBitacora("EXPORT_CALIFICACIONES", ciclo);
  };

  const exportAsistencia = () => {
    const rows = [["Fecha","Grupo","Matrícula","Alumno","Estado"]];
    Object.entries(asistencias).sort().forEach(([fecha,data]) => {
      Object.entries(data).forEach(([mat,est]) => {
        const a = alumnos.find(x=>x.matricula===mat);
        if (a) rows.push([fecha,`${a.grado}${a.grupo}`,mat,nombreCompleto(a),est]);
      });
    });
    exportXLSX([{name:"Asistencia",data:rows,cols:[12,6,12,28,6]}], `Asistencia_${ciclo}.xlsx`);
  };

  const exportUSAER = () => {
    const rows = [["#","Alumno","CURP","Grupo","Sexo","Condición USAER"]];
    usaerAlumnos.forEach((u,i) => rows.push([i+1,u.nombre,u.curp,u.grado_grupo,u.sexo,u.condicion_usaer]));
    exportXLSX([{name:"USAER",data:rows,cols:[4,32,20,6,6,26]}], `USAER_${ciclo}.xlsx`);
  };

  const exportBecados = () => {
    const rows = [["#","Alumno","Matrícula","CURP","Grupo","Sexo","Tipo Beca"]];
    alumnos.filter(a=>a.becado).forEach((a,i) => rows.push([i+1,nombreCompleto(a),a.matricula,a.curp,`${a.grado}${a.grupo}`,a.sexo,a.tipo_beca]));
    exportXLSX([{name:"Becados",data:rows,cols:[4,28,12,20,6,6,24]}], `Becados_${ciclo}.xlsx`);
  };

  const exportCompleto = () => {
    const materias = catalogs.materias || MATERIAS_DEFAULT;
    const sheets = [];
    // Hoja alumnos
    const hdrA = ["Matrícula","Primer Apellido","Segundo Apellido","Nombre","CURP","F.Nac","Sexo","Grado","Grupo","Estado","Becado","Tipo Beca"];
    sheets.push({name:"Alumnos",data:[hdrA,...alumnos.map(a=>[a.matricula,a.primer_apellido,a.segundo_apellido,a.nombre,a.curp,fmtFecha(a.fecha_nac),a.sexo,a.grado,a.grupo,a.activo?"Activo":"Baja",a.becado?"Sí":"No",a.tipo_beca||""])],cols:[12,16,16,16,20,12,8,4,4,8,4,22]});
    // Hoja grupos
    const hdrG = ["Grupo","Grado","Letra","Docente","Turno"];
    sheets.push({name:"Grupos",data:[hdrG,...(catalogs.grupos||[]).map(g=>{const doc=(catalogs.usuarios||[]).find(u=>u.id===g.docenteId);return [grupoKey(g),g.grado,g.letra,doc?.nombre||"Sin docente",g.turno==="M"?"Matutino":"Vespertino"];})]});
    // Hoja USAER
    sheets.push({name:"USAER",data:[["Alumno","CURP","Grupo","Condición"],...usaerAlumnos.map(u=>[u.nombre,u.curp,u.grado_grupo,u.condicion_usaer])],cols:[30,20,6,24]});
    // Hoja becados
    sheets.push({name:"Becados",data:[["Alumno","Matrícula","Grupo","Tipo Beca"],...alumnos.filter(a=>a.becado).map(a=>[nombreCompleto(a),a.matricula,`${a.grado}${a.grupo}`,a.tipo_beca])],cols:[28,12,6,22]});
    exportXLSX(sheets, `SGEA_Completo_${ciclo}_${hoy()}.xlsx`);
    addBitacora("EXPORT_COMPLETO", ciclo);
  };

  // ── IMPORTAR ALUMNOS DESDE EXCEL ────────────────────────────
  const handleFileExcel = async e => {
    const file = e.target.files[0]; if (!file) return;
    setImporting(true);
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf); const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (raw.length < 2) { notify("Archivo vacío o sin datos","err"); setImporting(false); return; }
      const hdrs = raw[0].map(h => String(h||"").trim().toLowerCase());
      const reqs = ["primer_apellido","nombre","curp"];
      const missing = reqs.filter(r => !hdrs.some(h => h.includes(r.split("_")[0])));
      if (missing.length) { notify(`Columnas faltantes: ${missing.join(", ")}`, "err"); setImporting(false); return; }
      // Mapear columnas flexible
      const idx = k => hdrs.findIndex(h => h.includes(k));
      const rows = raw.slice(1).filter(r => r.some(c => c));
      const parsed = rows.map(r => ({
        primer_apellido: String(r[idx("primer")] || "").trim().toUpperCase(),
        segundo_apellido: String(r[idx("segundo")] || "").trim().toUpperCase(),
        nombre: String(r[idx("nombre")] || "").trim().toUpperCase(),
        curp: String(r[idx("curp")] || "").trim().toUpperCase(),
        fecha_nac: r[idx("nac")] ? fmtFecha(r[idx("nac")]) : "",
        sexo: String(r[idx("sex")] || "HOMBRE").toUpperCase().includes("M") && !String(r[idx("sex")] || "").toUpperCase().includes("H") ? "MUJER" : "HOMBRE",
        grado: String(r[idx("grado")] || "1").trim(),
        grupo: String(r[idx("grupo")] || "A").trim().toUpperCase(),
        activo: true, becado: false, tipo_beca: "", turno: "M",
      })).filter(r => r.primer_apellido && r.nombre && r.curp);
      const errores = parsed.filter(r => !validarCURP(r.curp));
      setPreview({ rows: parsed, errores });
    } catch(err) { notify("Error al leer el archivo","err"); }
    setImporting(false);
    e.target.value = "";
  };

  const confirmarImport = () => {
    if (!preview) return;
    const existentes = new Set(alumnos.map(a => a.curp));
    const nuevos = preview.rows.filter(r => !existentes.has(r.curp));
    const dups   = preview.rows.filter(r => existentes.has(r.curp));
    const conMat  = nuevos.map(a => ({ ...a, matricula: "IMP" + Date.now().toString().slice(-7) + uid().slice(0,3) }));
    setEstado(p => {
      const cicloD = p.ciclosData[p.cicloActivo] || {};
      return { ...p, ciclosData: { ...p.ciclosData, [p.cicloActivo]: { ...cicloD, alumnos: [...(cicloD.alumnos||[]), ...conMat] } } };
    });
    addBitacora("IMPORTAR_ALUMNOS", `${nuevos.length} nuevos, ${dups.length} duplicados omitidos`);
    notify(`${nuevos.length} alumnos importados. ${dups.length} duplicados omitidos.`, nuevos.length > 0 ? "ok" : "warn");
    setPreview(null);
  };

  // ── RESPALDO JSON ────────────────────────────────────────────
  const handleJSON = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const data = await importarJSON(file);
      if (data.schemaVersion !== SCHEMA_VERSION) { notify("Versión de respaldo incompatible","warn"); return; }
      setEstado({ ...data, tsRespaldo: ahora(), cambiosSinRespaldar: 0 });
      addBitacora("RESTAURAR_BACKUP", file.name);
      notify("Respaldo restaurado ✅");
    } catch { notify("Error al leer respaldo","err"); }
    e.target.value = "";
  };

  const EXPORTS = [
    {ic:"👨‍🎓",lb:"Lista de Alumnos",       fn:exportAlumnos},
    {ic:"🏫", lb:"Grupos y Docentes",      fn:exportGrupos},
    {ic:"👤", lb:"Usuarios del Sistema",   fn:exportUsuarios},
    {ic:"📝", lb:"Todas las Calificaciones",fn:exportCalificaciones},
    {ic:"📅", lb:"Registro de Asistencia", fn:exportAsistencia},
    {ic:"♿", lb:"Alumnos USAER",          fn:exportUSAER},
    {ic:"🎓", lb:"Padrón de Becados",      fn:exportBecados},
    {ic:"📊", lb:"Reporte Completo (.xlsx)",fn:exportCompleto},
  ];

  return (
    <div className="fade-up">
      <PageTitle icon="📦" title="Importar / Exportar" />
      <div style={{ display:"flex",gap:8,marginBottom:14,flexWrap:"wrap" }}>
        {[["exportar","📥 Exportar a Excel"],["importar","📤 Importar Alumnos"],["respaldo","💾 Respaldo JSON"]].map(([id,lb]) => (
          <button key={id} className={`btn ${tab===id?"btn-dark":"btn-gray"}`} onClick={() => setTab(id)}>{lb}</button>
        ))}
      </div>

      {tab === "exportar" && (
        <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12 }}>
          {EXPORTS.map(ex => (
            <Card key={ex.lb} style={{ padding:16,cursor:"pointer",transition:"transform .15s",display:"flex",flexDirection:"column",alignItems:"center",gap:10,textAlign:"center" }}
              className="" onClick={ex.fn}>
              <div style={{ fontSize:36 }}>{ex.ic}</div>
              <div style={{ fontWeight:700,fontSize:13,color:C.p1 }}>{ex.lb}</div>
              <Btn cls="btn-p btn-sm">📥 Descargar .xlsx</Btn>
            </Card>
          ))}
        </div>
      )}

      {tab === "importar" && (
        <Card style={{ padding:22 }}>
          <h3 style={{ color:C.p1,margin:"0 0 14px",fontSize:15 }}>📤 Importar Alumnos desde Excel</h3>
          <div className="alert-banner alert-y" style={{ marginBottom:14 }}>
            <span style={{ fontSize:18 }}>ℹ️</span>
            <div style={{ fontSize:12 }}>
              <strong>Columnas requeridas en el Excel:</strong><br/>
              <code>primer_apellido</code>, <code>nombre</code>, <code>curp</code><br/>
              <strong>Opcionales:</strong> segundo_apellido, fecha_nac, sexo (HOMBRE/MUJER), grado (1-6), grupo (A/B/C)
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{ display:"none" }} onChange={handleFileExcel} />
          <Btn cls="btn-p" onClick={() => fileRef.current?.click()} disabled={importing}>
            {importing ? "⏳ Procesando…" : "📂 Seleccionar archivo Excel"}
          </Btn>

          {preview && (
            <div style={{ marginTop:16 }}>
              <div className={`alert-banner ${preview.errores.length>0?"alert-y":"alert-g"}`} style={{ marginBottom:12 }}>
                <span style={{ fontSize:18 }}>{preview.errores.length>0?"⚠️":"✅"}</span>
                <div style={{ fontSize:12 }}>
                  <strong>{preview.rows.length} registros encontrados</strong> · {preview.errores.length} con CURP inválida (se importarán igual)
                </div>
              </div>
              <div style={{ maxHeight:280,overflowY:"auto",marginBottom:12,border:`1px solid ${C.border}`,borderRadius:9 }}>
                <table className="tbl tbl-alt" style={{ fontSize:11.5 }}>
                  <thead><tr><th>Apellidos, Nombre</th><th>CURP</th><th style={{textAlign:"center"}}>Grado</th><th style={{textAlign:"center"}}>Sx</th><th style={{textAlign:"center"}}>CURP</th></tr></thead>
                  <tbody>
                    {preview.rows.slice(0,50).map((r,i) => {
                      const ok = validarCURP(r.curp); const dup = alumnos.find(a=>a.curp===r.curp);
                      return (
                        <tr key={i} style={dup?{background:"#fef3c7"}:{}}>
                          <td style={{fontWeight:600}}>{r.primer_apellido} {r.segundo_apellido}, {r.nombre}</td>
                          <td style={{fontFamily:"monospace",fontSize:10}}>{r.curp}</td>
                          <td style={{textAlign:"center"}}>{r.grado}°{r.grupo}</td>
                          <td style={{textAlign:"center"}}>{r.sexo==="HOMBRE"?"H":"M"}</td>
                          <td style={{textAlign:"center"}}>{dup?<span className="chip chip-y" style={{fontSize:9}}>DUP</span>:ok?<span className="chip chip-g" style={{fontSize:9}}>OK</span>:<span className="chip chip-r" style={{fontSize:9}}>CURP?</span>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {preview.rows.length > 50 && <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Mostrando 50 de {preview.rows.length}</div>}
              <div style={{ display:"flex",gap:8 }}>
                <Btn cls="btn-g" onClick={confirmarImport}>✅ Confirmar importación</Btn>
                <Btn cls="btn-gray" onClick={() => setPreview(null)}>Cancelar</Btn>
              </div>
            </div>
          )}
        </Card>
      )}

      {tab === "respaldo" && (
        <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14 }}>
          <Card style={{ padding:22 }}>
            <h3 style={{ color:C.p1,margin:"0 0 12px",fontSize:15 }}>💾 Generar Respaldo JSON</h3>
            <p style={{ fontSize:13,color:C.muted,marginBottom:14 }}>Descarga un archivo JSON con todos los datos del sistema. Guárdalo en lugar seguro.</p>
            {estado.tsRespaldo && <div style={{ fontSize:12,color:C.muted,marginBottom:10 }}>Último respaldo: <strong>{estado.tsRespaldo}</strong></div>}
            <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
              <Btn cls="btn-p" onClick={() => { exportarJSON(estado); setEstado(p=>({...p,tsRespaldo:ahora(),cambiosSinRespaldar:0})); notify("Respaldo guardado ✅"); addBitacora("RESPALDO_JSON","manual"); }}>
                💾 Descargar respaldo
              </Btn>
            </div>
          </Card>
          <Card style={{ padding:22 }}>
            <h3 style={{ color:C.p1,margin:"0 0 12px",fontSize:15 }}>📤 Restaurar desde Respaldo</h3>
            <div className="alert-banner alert-r" style={{ marginBottom:14 }}>
              <span style={{ fontSize:18 }}>⚠️</span>
              <div style={{ fontSize:12 }}><strong>Atención:</strong> Esto reemplazará TODOS los datos actuales.</div>
            </div>
            <input ref={jsonRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleJSON} />
            <Btn cls="btn-r" onClick={() => jsonRef.current?.click()}>📂 Seleccionar respaldo .json</Btn>
          </Card>
        </div>
      )}
    </div>
  );
}

// MÓDULO: BITÁCORA
// ══════════════════════════════════════════════════════════════════
function ModBitacora({ bitacora, ciclo }) {
  const [q, setQ] = useState("");
  const lista = useMemo(() => [...(bitacora||[])].reverse().filter(b =>
    !q || `${b.usuario} ${b.accion} ${b.detalle}`.toLowerCase().includes(q.toLowerCase())
  ), [bitacora, q]);

  const exportar = () => {
    const rows = [["Fecha/Hora","Usuario","Nombre","Acción","Detalle"]];
    (bitacora||[]).forEach(b => rows.push([b.ts, b.usuario, b.nombre, b.accion, b.detalle||""]));
    exportXLSX([{name:"Bitácora",data:rows,cols:[18,14,28,22,40]}], `Bitacora_${ciclo}_${hoy()}.xlsx`);
  };

  return (
    <div className="fade-up">
      <PageTitle icon="📜" title={`Bitácora de Cambios (${(bitacora||[]).length})`}>
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
      </PageTitle>
      <input className="inp no-print" value={q} onChange={e => setQ(e.target.value)} placeholder="🔍 Buscar por usuario, acción…" style={{ marginBottom:12 }}/>
      <Card>
        {lista.length === 0 ? <Empty icon="📜" msg="Sin registros en la bitácora." /> : (
          <div style={{ overflowX:"auto" }}>
            <table className="tbl tbl-alt" style={{ fontSize:11.5 }}>
              <thead><tr>{["Fecha/Hora","Usuario","Acción","Detalle"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {lista.slice(0,200).map(b => (
                  <tr key={b.id}>
                    <td style={{ fontFamily:"monospace",fontSize:10.5,whiteSpace:"nowrap" }}>{b.ts}</td>
                    <td><span className="chip chip-b">{b.usuario}</span></td>
                    <td><span className="chip chip-gray">{b.accion}</span></td>
                    <td style={{ fontSize:11,color:C.muted }}>{b.detalle||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// MÓDULO: BECAS
// ══════════════════════════════════════════════════════════════════
function ModBecas({ activos, setAlumnos, notify, addBitacora, ciclo, grupos }) {
  const [grupo, setGrupo] = useState("");
  const [q, setQ] = useState("");
  const becados = activos.filter(a => a.becado);
  const lista = useMemo(() => activos.filter(a => {
    const ok1 = grupo ? `${a.grado}${a.grupo}` === grupo : true;
    const ok2 = q ? `${a.primer_apellido} ${a.nombre} ${a.matricula}`.toLowerCase().includes(q.toLowerCase()) : true;
    return ok1 && ok2;
  }), [activos, grupo, q]);

  const toggle = (mat, tipo) => {
    const a = activos.find(x => x.matricula === mat);
    const val = !a.becado;
    setAlumnos(p => p.map(x => x.matricula === mat ? { ...x, becado: val, tipo_beca: val ? tipo : "" } : x));
    addBitacora(val ? "ASIGNAR_BECA" : "REMOVER_BECA", `${a.primer_apellido} ${a.nombre} — ${tipo||""}`);
    notify(val ? "Beca asignada ✅" : "Beca removida");
  };

  const exportar = () => {
    const rows = [["#","Alumno","Matrícula","Grupo","Sexo","Tipo Beca"]];
    becados.forEach((a,i) => rows.push([i+1,nombreCompleto(a),a.matricula,`${a.grado}${a.grupo}`,a.sexo,a.tipo_beca||""]));
    exportXLSX([{name:"Becados",data:rows,cols:[4,28,12,6,6,24]}], `Becados_${ciclo}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo="PADRÓN DE BECADOS" ciclo={ciclo} />
      <PageTitle icon="🎓" title={`Becas — ${becados.length} becados`}>
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>
      <div style={{ display:"flex",gap:8,marginBottom:12,flexWrap:"wrap" }}>
        <input className="inp" style={{flex:1,minWidth:160}} value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar alumno…"/>
        <select className="sel" value={grupo} onChange={e=>setGrupo(e.target.value)}>
          <option value="">Todos los grupos</option>
          {grupos.map(g=><option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}</option>)}
        </select>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:14 }}>
        {[["🎓","Total becados",becados.length,C.w1],["👦","Hombres",becados.filter(a=>a.sexo==="HOMBRE").length,C.p3],["👧","Mujeres",becados.filter(a=>a.sexo==="MUJER").length,C.pink]].map(([ic,lb,vl,co])=>(
          <div key={lb} className="stat-card" style={{borderTop:`4px solid ${co}`}}>
            <div style={{fontSize:22}}>{ic}</div>
            <div style={{fontSize:22,fontWeight:800,color:co}}>{vl}</div>
            <div style={{fontSize:11,color:C.muted}}>{lb}</div>
          </div>
        ))}
      </div>
      <Card>
        <div style={{overflowX:"auto"}}>
          <table className="tbl tbl-alt" style={{fontSize:12}}>
            <thead><tr>
              <th style={{width:28,textAlign:"center"}}>#</th>
              <th>Alumno</th>
              <th style={{textAlign:"center"}}>Grupo</th>
              <th style={{textAlign:"center"}}>Sx</th>
              <th style={{minWidth:180}}>Tipo de Beca</th>
              <th style={{textAlign:"center"}}>Estado</th>
              <th style={{textAlign:"center"}}>Acción</th>
            </tr></thead>
            <tbody>
              {lista.map((a,i)=>(

// MÓDULO: ESTADÍSTICA 911
// ══════════════════════════════════════════════════════════════════
function ModEst911({ activos, cortes911, setCortes911, ciclo, notify, soloLectura }) {
  const [corte, setCorte] = useState("inicio");

  const registrarFecha = (id) => {
    if (soloLectura) return;
    setCortes911(p => ({ ...p, [id]: { ...(p[id]||{}), fecha: hoy(), registrado: true } }));
    notify(`Corte "${CORTES_911.find(c=>c.id===id)?.label}" registrado ✅`);
  };

  // Tabla I — matrícula grado × sexo
  const tablaI = useMemo(() => {
    const data = {};
    [1,2,3,4,5,6].forEach(g => {
      const del = activos.filter(a => a.grado === String(g));
      data[g] = { H: del.filter(a=>a.sexo==="HOMBRE").length, M: del.filter(a=>a.sexo==="MUJER").length };
    });
    return data;
  }, [activos]);

  // Tabla II — distribución por edad al 01/Sep
  const tablaII = useMemo(() => {
    const dist = {};
    activos.forEach(a => {
      const edad = calcEdad(a.fecha_nac, ciclo);
      if (typeof edad === "number") {
        if (!dist[edad]) dist[edad] = { H:0, M:0 };
        dist[edad][a.sexo==="HOMBRE"?"H":"M"]++;
      }
    });
    return Object.entries(dist).sort((a,b)=>+a[0]-+b[0]);
  }, [activos, ciclo]);

  const exportar = () => {
    const t1 = [["Grado","Hombres","Mujeres","Total"],...[1,2,3,4,5,6].map(g=>[`${g}° Grado`,tablaI[g].H,tablaI[g].M,tablaI[g].H+tablaI[g].M]),
      ["TOTAL",Object.values(tablaI).reduce((s,v)=>s+v.H,0),Object.values(tablaI).reduce((s,v)=>s+v.M,0),activos.length]];
    const t2 = [["Edad","Hombres","Mujeres","Total"],...tablaII.map(([e,v])=>[`${e} años`,v.H,v.M,v.H+v.M])];
    exportXLSX([{name:"Tabla_I_Matricula",data:t1,cols:[12,10,10,8]},{name:"Tabla_II_Edades",data:t2,cols:[10,10,10,8]}],`Est911_${ciclo}_${hoy()}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo="ESTADÍSTICA 911 — INICIO DE CICLO" ciclo={ciclo} />
      <PageTitle icon="📊" title="Estadística 911">
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
      </PageTitle>

      {/* Control de cortes */}
      <Card style={{padding:16,marginBottom:14}}>
        <h3 style={{color:C.p1,margin:"0 0 12px",fontSize:14,fontWeight:700}}>📅 Control de Cortes</h3>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {CORTES_911.map(c => {
            const reg = cortes911[c.id];
            return (
              <div key={c.id} style={{flex:1,minWidth:160,background:reg?.registrado?`${C.s1}11`:"#f8fafc",border:`1.5px solid ${reg?.registrado?C.s1:C.border}`,borderRadius:11,padding:12,textAlign:"center"}}>
                <div style={{fontWeight:700,fontSize:13,color:reg?.registrado?C.s1:C.text,marginBottom:6}}>{c.label}</div>
                {reg?.fecha ? (
                  <div style={{fontSize:12,color:C.muted,marginBottom:6}}>📅 {reg.fecha}</div>
                ) : (
                  <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Sin registrar</div>
                )}
                {!soloLectura && (
                  <button className={`btn btn-xs ${reg?.registrado?"btn-gray":"btn-g"}`}
                    onClick={()=>registrarFecha(c.id)}>
                    {reg?.registrado?"✅ Registrado":"📅 Registrar hoy"}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:14}}>
        {/* Tabla I */}
        <Card>
          <CardHdr style={{background:`${C.p1}11`}}>
            <h3 style={{margin:0,fontSize:13,color:C.p1,fontWeight:700}}>Tabla I — Matrícula por Grado y Sexo</h3>
          </CardHdr>
          <table className="tbl">
            <thead><tr>
              <th>Grado</th>
              <th style={{textAlign:"center",background:C.p2}}>Hombres</th>
              <th style={{textAlign:"center",background:C.pink}}>Mujeres</th>
              <th style={{textAlign:"center"}}>Total</th>
            </tr></thead>
            <tbody>
              {[1,2,3,4,5,6].map(g=>(
                <tr key={g}>
                  <td style={{fontWeight:700}}>{g}° Grado</td>
                  <td style={{textAlign:"center",color:C.p2,fontWeight:700}}>{tablaI[g]?.H||0}</td>
                  <td style={{textAlign:"center",color:C.pink,fontWeight:700}}>{tablaI[g]?.M||0}</td>
                  <td style={{textAlign:"center",fontWeight:800}}>{(tablaI[g]?.H||0)+(tablaI[g]?.M||0)}</td>
                </tr>
              ))}
              <tr className="tbl-total">
                <td><strong>TOTAL</strong></td>
                <td style={{textAlign:"center"}}><strong>{Object.values(tablaI).reduce((s,v)=>s+v.H,0)}</strong></td>
                <td style={{textAlign:"center"}}><strong>{Object.values(tablaI).reduce((s,v)=>s+v.M,0)}</strong></td>
                <td style={{textAlign:"center",fontSize:15}}><strong>{activos.length}</strong></td>
              </tr>
            </tbody>
          </table>
        </Card>

        {/* Tabla II */}
        <Card>
          <CardHdr style={{background:`${C.p1}11`}}>
            <h3 style={{margin:0,fontSize:13,color:C.p1,fontWeight:700}}>Tabla II — Distribución por Edad (al 01/Sep)</h3>
          </CardHdr>
          <table className="tbl">
            <thead><tr>
              <th>Edad</th>
              <th style={{textAlign:"center",background:C.p2}}>H</th>
              <th style={{textAlign:"center",background:C.pink}}>M</th>
              <th style={{textAlign:"center"}}>Total</th>
            </tr></thead>
            <tbody>
              {tablaII.map(([e,v])=>(
                <tr key={e}>
                  <td style={{fontWeight:600}}>{e} años</td>
                  <td style={{textAlign:"center",color:C.p2}}>{v.H}</td>
                  <td style={{textAlign:"center",color:C.pink}}>{v.M}</td>
                  <td style={{textAlign:"center",fontWeight:700}}>{v.H+v.M}</td>
                </tr>
              ))}
              <tr className="tbl-total">
                <td><strong>TOTAL</strong></td>
                <td style={{textAlign:"center"}}><strong>{tablaII.reduce((s,[,v])=>s+v.H,0)}</strong></td>
                <td style={{textAlign:"center"}}><strong>{tablaII.reduce((s,[,v])=>s+v.M,0)}</strong></td>
                <td style={{textAlign:"center",fontSize:15}}><strong>{activos.length}</strong></td>
              </tr>
            </tbody>
          </table>
        </Card>
      </div>
    </div>
  );
}

// MÓDULO: REPORTES GENERALES
// ══════════════════════════════════════════════════════════════════
function ModReportes({ activos, alumnos, movimientos, calificaciones, efCals, asistencias, usaerAlumnos, catalogs, ciclo, grupos }) {
  const [rep, setRep] = useState("general");
  const materias = catalogs.materias || MATERIAS_DEFAULT;

  const getProm = (mat, grupo, periodo) => {
    const key = `${grupo}-P${periodo}`;
    const d = calificaciones[key] || {}; const ef = efCals[key] || {};
    const vals = materias.map((m, mi) => {
      if (!m.tieneEF) return (d[mat]||{})[mi];
      return calHumano((d[mat]||{})[mi], (ef[mat]||{})[mi], m.pctEF);
    }).filter(v => v !== undefined && v !== null);
    return vals.length ? promedioArr(vals) : null;
  };

  const exportReporte = () => {
    const rows = [["#","Alumno","Matrícula","Grupo","Sexo","Edad","P1","P2","P3","Prom.Gral","Becado","USAER"]];
    const usaerS = new Set(usaerAlumnos.map(u=>u.curp));
    activos.forEach((a,i)=>{
      const gk = `${a.grado}${a.grupo}`;
      const p1 = getProm(a.matricula,gk,"1"), p2 = getProm(a.matricula,gk,"2"), p3 = getProm(a.matricula,gk,"3");
      const pg = promedioArr([p1,p2,p3].filter(v=>v!==null));
      rows.push([i+1,nombreCompleto(a),a.matricula,gk,a.sexo,calcEdad(a.fecha_nac,ciclo),p1??"",(p2)??"",p3??"",pg??"",a.becado?"Sí":"No",usaerS.has(a.curp)?"Sí":"No"]);
    });
    exportXLSX([{name:"Reporte General",data:rows,cols:[4,28,12,6,6,4,6,6,6,6,4,4]}],`Reporte_General_${ciclo}.xlsx`);
  };

  const REPS = [
    {id:"general",  ic:"📊", lb:"General"},
    {id:"rezago",   ic:"⚠️",  lb:"Rezago"},
    {id:"asist",    ic:"📅", lb:"Asistencia"},
    {id:"becados",  ic:"🎓", lb:"Becados"},
    {id:"usaer_r",  ic:"♿", lb:"USAER"},
  ];

  return (
    <div className="fade-up">
      <CabImpresion titulo="REPORTES GENERALES" ciclo={ciclo} />
      <PageTitle icon="📈" title="Reportes">
        <Btn cls="btn-gray" onClick={exportReporte}>📥 Excel Completo</Btn>
        <PrintBtn />
      </PageTitle>
      <div className="no-print" style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {REPS.map(r=><button key={r.id} className={`btn ${rep===r.id?"btn-dark":"btn-gray"}`} onClick={()=>setRep(r.id)}>{r.ic} {r.lb}</button>)}
      </div>

      {rep === "general" && <RepGeneral activos={activos} alumnos={alumnos} movimientos={movimientos} ciclo={ciclo} grupos={grupos} getProm={getProm} usaerAlumnos={usaerAlumnos} catalogs={catalogs} />}
      {rep === "rezago"  && <RepRezago  activos={activos} ciclo={ciclo} grupos={grupos} getProm={getProm} />}
      {rep === "asist"   && <RepAsist   activos={activos} asistencias={asistencias} ciclo={ciclo} grupos={grupos} />}
      {rep === "becados" && <RepBecados activos={activos} ciclo={ciclo} grupos={grupos} />}
      {rep === "usaer_r" && <ModUSAERRep activos={activos} usaerAlumnos={usaerAlumnos} ciclo={ciclo} grupos={grupos} />}
    </div>
  );
}

function RepRezago({ activos, ciclo, grupos, getProm }) {
  const rezago = useMemo(() => {
    const lista = [];
    activos.forEach(a => {
      const gk = `${a.grado}${a.grupo}`;
      ["1","2","3"].forEach(p => {
        const pr = getProm(a.matricula, gk, p);
        if (pr !== null && pr < 6) lista.push({ ...a, periodo:p, promedio:pr });
      });
    });
    return lista;
  }, [activos, getProm]);

  return (
    <Card>
      <CardHdr><h3 style={{margin:0,fontSize:14,color:C.d1}}>⚠️ Alumnos en Rezago ({rezago.length})</h3></CardHdr>

            <tbody>

                  <td style={{textAlign:"center"}}><span className="chip chip-gray">P{a.periodo}</span></td>

}

function RepAsist({ activos, asistencias, ciclo, grupos }) {
  const resumen = useMemo(() => {
    return grupos.map(g => {
      const gk = grupoKey(g);
      const del = activos.filter(a=>`${a.grado}${a.grupo}`===gk);
      if (!del.length) return null;
      let totalP=0,totalA=0,totalDias=0;
      Object.values(asistencias).forEach(dia => {
        del.forEach(a => { const e=dia[a.matricula]; if(e==="P")totalP++; else if(e==="A")totalA++; });
        totalDias++;
      });
      const total = totalP+totalA; const pct = total ? Math.round(totalP/total*100) : null;
      return {gk,n:del.length,totalP,totalA,pct};
    }).filter(Boolean);
  }, [grupos, activos, asistencias]);

  return (
    <Card>
      <CardHdr><h3 style={{margin:0,fontSize:14,color:C.p1}}>📅 Resumen de Asistencia por Grupo</h3></CardHdr>
      <div style={{overflowX:"auto"}}>
        <table className="tbl tbl-alt" style={{fontSize:12}}>
          <thead><tr>{["Grupo","Alumnos","Total Presencias","Total Ausencias","% Asistencia"].map(h=><th key={h} style={{textAlign:"center"}}>{h}</th>)}</tr></thead>
          <tbody>
            {resumen.map(r=>(
              <tr key={r.gk}>
                <td style={{textAlign:"center"}}><span className="chip chip-b">{r.gk}</span></td>
                <td style={{textAlign:"center"}}>{r.n}</td>
                <td style={{textAlign:"center",color:C.s1,fontWeight:700}}>{r.totalP}</td>
                <td style={{textAlign:"center",color:C.d1,fontWeight:700}}>{r.totalA}</td>
                <td style={{textAlign:"center"}}>
                  {r.pct!==null ? <span className={`chip ${r.pct>=90?"chip-g":r.pct>=75?"chip-b":"chip-r"}`}>{r.pct}%</span> : <span style={{color:C.muted}}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

function RepBecados({ activos, ciclo, grupos }) {
  const becados = activos.filter(a=>a.becado);
  const porTipo = useMemo(()=>{
    const d={};
    becados.forEach(a=>{ const t=a.tipo_beca||"Sin tipo"; d[t]=(d[t]||0)+1; });

  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      <Card style={{padding:16}}>
        <h3 style={{color:C.w1,margin:"0 0 12px",fontSize:14}}>🎓 Por Tipo de Beca</h3>

          <div key={t} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,fontSize:12.5}}>

      </Card>
      <Card style={{padding:16}}>
        <h3 style={{color:C.w1,margin:"0 0 12px",fontSize:14}}>🏫 Por Grado</h3>
        {[1,2,3,4,5,6].map(g=>{
          const n=becados.filter(a=>a.grado===String(g)).length;

            <div key={g} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,fontSize:12.5}}>

function ModUSAER({ activos, usaerAlumnos, setUsaer, notify, addBitacora, ciclo, grupos, soloLectura }) {
  const [tab, setTab]     = useState("lista");
  const [q, setQ]         = useState("");
  const [gFilt, setGFilt] = useState("");
  const [addOpen, setAdd] = useState(false);
  const [nuevo, setNuevo] = useState({ nombre:"",curp:"",grado_grupo:"1A",sexo:"HOMBRE",condicion_usaer:"Dificultades de Aprendizaje",observaciones:"" });

  const lista = useMemo(() => usaerAlumnos.filter(u =>
    (!q || `${u.nombre} ${u.curp}`.toLowerCase().includes(q.toLowerCase())) &&
    (!gFilt || u.grado_grupo === gFilt)
  ), [usaerAlumnos, q, gFilt]);

  const agregar = () => {
    if (!nuevo.nombre.trim() || !nuevo.curp.trim()) { notify("Nombre y CURP son requeridos","err"); return; }
    if (usaerAlumnos.find(u=>u.curp===nuevo.curp.toUpperCase())) { notify("CURP ya registrada en USAER","err"); return; }
    const nu = { ...nuevo, curp: nuevo.curp.toUpperCase(), id: uid() };
    setUsaer(p=>[...p,nu]);
    addBitacora("ALTA_USAER", `${nuevo.nombre} — ${nuevo.grado_grupo} — ${nuevo.condicion_usaer}`);
    setAdd(false); setNuevo({ nombre:"",curp:"",grado_grupo:"1A",sexo:"HOMBRE",condicion_usaer:"Dificultades de Aprendizaje",observaciones:"" });
    notify("Alumno USAER registrado ✅");
  };

  const remover = curp => {
    const u = usaerAlumnos.find(x=>x.curp===curp);
    setUsaer(p=>p.filter(x=>x.curp!==curp));
    addBitacora("BAJA_USAER", `${u?.nombre}`);
    notify("Registro USAER eliminado");
  };

  const updCondicion = (curp, val) => {
    setUsaer(p=>p.map(u=>u.curp===curp?{...u,condicion_usaer:val}:u));
    notify("Condición actualizada ✅");
  };

  const exportar = () => {
    const rows = [["#","Nombre","CURP","Grupo","Sexo","Condición USAER","Observaciones"]];
    usaerAlumnos.forEach((u,i)=>rows.push([i+1,u.nombre,u.curp,u.grado_grupo,u.sexo,u.condicion_usaer,u.observaciones||""]));
    exportXLSX([{name:"USAER",data:rows,cols:[4,32,20,6,6,26,30]}],`USAER_${ciclo}.xlsx`);
  };

  return (
    <div className="fade-up">
      <CabImpresion titulo="SERVICIO USAER — REGISTRO DE ALUMNOS" ciclo={ciclo} />
      <PageTitle icon="♿" title={`USAER No. 17 — ${usaerAlumnos.length} alumnos`}>
        {soloLectura && <span className="chip chip-y">📚 Solo Lectura</span>}
        <Btn cls="btn-gray" onClick={exportar}>📥 Excel</Btn>
        <PrintBtn />
        {!soloLectura && <Btn cls="btn-v" onClick={()=>setAdd(true)}>➕ Agregar</Btn>}
      </PageTitle>
      <div className="no-print" style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="inp" style={{flex:1,minWidth:160}} value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Nombre o CURP…"/>
        <select className="sel" value={gFilt} onChange={e=>setGFilt(e.target.value)}>
          <option value="">Todos los grupos</option>
          {grupos.map(g=><option key={g.id} value={grupoKey(g)}>Grupo {grupoKey(g)}</option>)}
        </select>
      </div>
      <Card>
        {lista.length===0 ? <Empty icon="♿" msg="Sin registros USAER." /> : (
          <div style={{overflowX:"auto"}}>
            <table className="tbl tbl-alt" style={{fontSize:12}}>
              <thead><tr>
                <th style={{width:28,textAlign:"center"}}>#</th>
                <th style={{minWidth:160}}>Nombre</th>
                <th>CURP</th>
                <th style={{textAlign:"center"}}>Grupo</th>
                <th style={{textAlign:"center"}}>Sx</th>
                <th style={{minWidth:180}}>Condición</th>
                {!soloLectura && <th style={{textAlign:"center",width:60}}>Acc.</th>}
              </tr></thead>
              <tbody>
                {lista.map((u,i)=>(
                  <tr key={u.curp}>
                    <td style={{textAlign:"center",color:C.muted,fontSize:11}}>{i+1}</td>
                    <td style={{fontWeight:600}}>{u.nombre}</td>
                    <td style={{fontFamily:"monospace",fontSize:10.5}}>{u.curp}</td>
                    <td style={{textAlign:"center"}}><span className="chip chip-b">{u.grado_grupo}</span></td>
                    <td style={{textAlign:"center"}}>{u.sexo==="HOMBRE"?"H":"M"}</td>
                    <td>
                      {!soloLectura ? (
                        <select className="sel" style={{width:"100%",padding:"4px 7px",fontSize:11}}
                          value={u.condicion_usaer} onChange={e=>updCondicion(u.curp,e.target.value)}>
                          {CONDICIONES_USAER.map(c=><option key={c}>{c}</option>)}
                        </select>
                      ) : <UsaerBadge condicion={u.condicion_usaer} />}
                    </td>
                    {!soloLectura && <td style={{textAlign:"center"}}><Btn cls="btn-r btn-xs" onClick={()=>remover(u.curp)}>🗑️</Btn></td>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {addOpen && !soloLectura && (
        <div className="modal-bg" onClick={()=>setAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
            <div className="modal-hdr"><span className="modal-title">➕ Nuevo Alumno USAER</span><button className="modal-close" onClick={()=>setAdd(false)}>✕</button></div>
            <FormGrid>
              <Field label="Nombre Completo *"><input className="inp" value={nuevo.nombre} onChange={e=>setNuevo(p=>({...p,nombre:e.target.value.toUpperCase()}))} /></Field>
              <Field label="CURP *"><input className="inp" value={nuevo.curp} maxLength={18} onChange={e=>setNuevo(p=>({...p,curp:e.target.value.toUpperCase()}))} /></Field>
              <Field label="Grupo">
                <select className="sel" style={{width:"100%"}} value={nuevo.grado_grupo} onChange={e=>setNuevo(p=>({...p,grado_grupo:e.target.value}))}>
                  {grupos.map(g=><option key={g.id} value={grupoKey(g)}>{grupoKey(g)}</option>)}
                </select>
              </Field>
              <Field label="Sexo">
                <select className="sel" style={{width:"100%"}} value={nuevo.sexo} onChange={e=>setNuevo(p=>({...p,sexo:e.target.value}))}>
                  <option>HOMBRE</option><option>MUJER</option>
                </select>
              </Field>
              <Field label="Condición USAER" style={{gridColumn:"1/-1"}}>
                <select className="sel" style={{width:"100%"}} value={nuevo.condicion_usaer} onChange={e=>setNuevo(p=>({...p,condicion_usaer:e.target.value}))}>
                  {CONDICIONES_USAER.map(c=><option key={c}>{c}</option>)}
                </select>
              </Field>
            </FormGrid>
            <Field label="Observaciones"><input className="inp" value={nuevo.observaciones} onChange={e=>setNuevo(p=>({...p,observaciones:e.target.value}))} placeholder="Opcional…" style={{marginBottom:14}} /></Field>
            <div style={{display:"flex",gap:8}}>
              <Btn cls="btn-v" onClick={agregar}>💾 Registrar</Btn>
              <Btn cls="btn-gray" onClick={()=>setAdd(false)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ModUSAERRep({ activos, usaerAlumnos, ciclo, grupos }) {
  const porCondicion = useMemo(()=>{
    const d={};
    usaerAlumnos.forEach(u=>{ d[u.condicion_usaer]=(d[u.condicion_usaer]||0)+1; });
    return Object.entries(d).sort((a,b)=>b[1]-a[1]);
  },[usaerAlumnos]);

  return (
    <div className="fade-up">
      <CabImpresion titulo="REPORTE USAER No. 17" ciclo={ciclo} />
      <PageTitle icon="📊" title="Reportes USAER"><PrintBtn /></PageTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,marginBottom:14}}>
        {[["♿","Total",usaerAlumnos.length,C.v1],["👦","Hombres",usaerAlumnos.filter(u=>u.sexo==="HOMBRE").length,C.p3],["👧","Mujeres",usaerAlumnos.filter(u=>u.sexo==="MUJER").length,C.pink]].map(([ic,lb,vl,co])=>(
          <div key={lb} className="stat-card" style={{borderTop:`4px solid ${co}`}}>
            <div style={{fontSize:22}}>{ic}</div>
            <div style={{fontSize:22,fontWeight:800,color:co}}>{vl}</div>
            <div style={{fontSize:11,color:C.muted}}>{lb}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
        <Card style={{padding:16}}>
          <h3 style={{color:C.v1,margin:"0 0 12px",fontSize:14}}>Por Condición</h3>
          {porCondicion.map(([c,n])=>(
            <div key={c} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
              <span>{c}</span><strong style={{color:C.v1}}>{n}</strong>
            </div>
          ))}
        </Card>
        <Card style={{padding:16}}>
          <h3 style={{color:C.v1,margin:"0 0 12px",fontSize:14}}>Por Grupo</h3>
          {grupos.map(g=>{
            const gk=grupoKey(g); const n=usaerAlumnos.filter(u=>u.grado_grupo===gk).length;
            return n>0?(
              <div key={gk} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                <span className="chip chip-b">{gk}</span>
                <strong style={{color:C.v1}}>{n}</strong>
              </div>
            ):null;
          })}
        </Card>
      </div>
    </div>
  );
}

function ModMisAlumnos({ alumnos, ciclo, usaerAlumnos, grupo }) {
  const usaerS = useMemo(()=>new Set((usaerAlumnos||[]).map(u=>u.curp)),[usaerAlumnos]);
  const activos = alumnos.filter(a=>a.activo);
  return (
    <div className="fade-up">
      <CabImpresion titulo={`MIS ALUMNOS — GRUPO ${alumnos[0]?.grado||""}°${alumnos[0]?.grupo||""}`} ciclo={ciclo} />
      <PageTitle icon="👨‍🎓" title={`Mis Alumnos — Grupo ${alumnos[0]?.grado||""}°${alumnos[0]?.grupo||""} (${activos.length})`}><PrintBtn /></PageTitle>
      <Card>
        <div style={{overflowX:"auto"}}>
          <table className="tbl tbl-alt" style={{fontSize:12}}>
            <thead><tr>
              <th style={{width:28,textAlign:"center"}}>#</th>
              <th>Nombre Completo</th>
              <th>CURP</th>
              <th style={{textAlign:"center"}}>Sx</th>
              <th style={{textAlign:"center"}}>Edad</th>
              <th style={{textAlign:"center"}}>Estado</th>
            </tr></thead>
            <tbody>
              {activos.map((a,i)=>(
                <tr key={a.matricula}>
                  <td style={{textAlign:"center",color:C.muted,fontSize:11}}>{i+1}</td>
                  <td>
                    <span style={{fontWeight:600}}>{a.primer_apellido} {a.segundo_apellido}, {a.nombre}</span>
                    {usaerS.has(a.curp)&&<> <UsaerBadge /></>}
                    {a.becado&&<> <span className="chip chip-y" style={{fontSize:9}}>🎓</span></>}
                  </td>
                  <td style={{fontFamily:"monospace",fontSize:10.5}}>{a.curp}</td>
                  <td style={{textAlign:"center"}}>{a.sexo==="HOMBRE"?"H":"M"}</td>
                  <td style={{textAlign:"center"}}>{calcEdad(a.fecha_nac,ciclo)}</td>
                  <td style={{textAlign:"center"}}><span className={`chip ${a.activo?"chip-g":"chip-r"}`}>{a.activo?"Activo":"Baja"}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function ModMisReportes({ alumnos, calificaciones, efCals, asistencias, ciclo, grupoFijo, catalogs }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const activos  = alumnos.filter(a=>a.activo);
  const getProm  = (mat,p) => {
    const key=`${grupoFijo}-P${p}`; const d=calificaciones[key]||{}; const ef=efCals[key]||{};
    const vals=materias.map((m,mi)=>!m.tieneEF?(d[mat]||{})[mi]:calHumano((d[mat]||{})[mi],(ef[mat]||{})[mi],m.pctEF)).filter(v=>v!==undefined&&v!==null);
    return vals.length?promedioArr(vals):null;
  };
  return (
    <div className="fade-up">
      <CabImpresion titulo={`REPORTE — GRUPO ${grupoFijo}`} ciclo={ciclo} />
      <PageTitle icon="📈" title={`Mis Reportes — Grupo ${grupoFijo}`}><PrintBtn /></PageTitle>
      <Card>
        <CardHdr><h3 style={{margin:0,fontSize:14,color:C.p1}}>📝 Promedios por Periodo</h3></CardHdr>
        <div style={{overflowX:"auto"}}>
          <table className="tbl tbl-alt" style={{fontSize:12}}>
            <thead><tr>
              <th>Alumno</th>
              {["1","2","3"].map(p=><th key={p} style={{textAlign:"center"}}>P{p}</th>)}
              <th style={{textAlign:"center"}}>Prom.</th>
            </tr></thead>
            <tbody>
              {activos.map(a=>{
                const ps=["1","2","3"].map(p=>getProm(a.matricula,p));
                const pg=promedioArr(ps.filter(v=>v!==null));
                return (
                  <tr key={a.matricula}>
                    <td style={{fontWeight:600}}>{a.primer_apellido} {a.nombre}</td>
                    {ps.map((p,i)=><td key={i} style={{textAlign:"center",fontWeight:700,color:p===null?C.muted:p<6?C.d1:p>=9?C.s1:C.text}}>{p!==null?p.toFixed(1):"—"}</td>)}
                    <td style={{textAlign:"center",fontWeight:800,fontSize:13,color:pg===null?C.muted:pg<6?C.d1:pg>=9?C.s1:C.text}}>{pg!==null?pg.toFixed(1):"—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ── BOLETA INDIVIDUAL ─────────────────────────────────────────────
function ModBoleta({ alumnos, calificaciones, efCals, ciclo, grupoFijo, catalogs, usaerAlumnos }) {
  const materias = catalogs.materias || MATERIAS_DEFAULT;
  const [sel, setSel] = useState(null);
  const usaerMap = useMemo(()=>{const m={};usaerAlumnos.forEach(u=>m[u.curp]=u);return m;},[usaerAlumnos]);

  const getProm = (mat, p) => {
    const key = `${grupoFijo}-P${p}`; const d = calificaciones[key]||{}; const ef = efCals[key]||{};
    const vals = materias.map((m,mi)=>!m.tieneEF?(d[mat]||{})[mi]:calHumano((d[mat]||{})[mi],(ef[mat]||{})[mi],m.pctEF)).filter(v=>v!==undefined&&v!==null);
    return vals.length ? promedioArr(vals) : null;
  };

  const alumno = sel ? alumnos.find(a=>a.matricula===sel) : null;

  return (
    <div className="fade-up">
      <PageTitle icon="📄" title="Boleta de Calificaciones"><PrintBtn /></PageTitle>
      <div className="no-print" style={{marginBottom:12}}>
        <select className="sel" value={sel||""} onChange={e=>setSel(e.target.value)}>
          <option value="">— Seleccione un alumno —</option>
          {alumnos.map(a=><option key={a.matricula} value={a.matricula}>{a.primer_apellido} {a.nombre}</option>)}
        </select>
      </div>
      {alumno && (
        <Card style={{maxWidth:700,margin:"0 auto",padding:24}}>
          {/* Cabecera boleta */}
          <div style={{borderBottom:"3px solid #000",paddingBottom:12,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:800,fontSize:13,textTransform:"uppercase"}}>Secretaría de Educación Pública</div>
                <div style={{fontWeight:700,fontSize:12}}>Escuela Primaria: {ESCUELA.nombre}</div>
                <div style={{fontSize:11}}>CCT: {ESCUELA.cct} · Zona: {ESCUELA.zona} · {ESCUELA.municipio}, {ESCUELA.estado}</div>
                <div style={{fontSize:11}}>Turno: {ESCUELA.turno} · Ciclo Escolar: {ciclo}</div>
              </div>
              <div style={{textAlign:"right",fontSize:11}}>
                <div>Directora:</div>
                <div style={{fontWeight:700}}>{ESCUELA.director}</div>
              </div>
            </div>
            <div style={{textAlign:"center",fontWeight:800,fontSize:15,marginTop:10}}>BOLETA DE EVALUACIÓN</div>
          </div>
          {/* Datos alumno */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14,fontSize:12}}>
            {[["Alumno(a)",`${alumno.primer_apellido} ${alumno.segundo_apellido} ${alumno.nombre}`],["Matrícula",alumno.matricula],["CURP",alumno.curp],["Grupo",`${alumno.grado}° ${alumno.grupo}`],["F.Nac.",fmtFecha(alumno.fecha_nac)],["Edad",`${calcEdad(alumno.fecha_nac,ciclo)} años`]].map(([k,v])=>(
              <div key={k} style={{display:"flex",gap:8,borderBottom:`1px solid ${C.border}`,paddingBottom:4}}>
                <span style={{fontWeight:700,minWidth:70}}>{k}:</span>
                <span style={{wordBreak:"break-all"}}>{v}</span>
              </div>
            ))}
          </div>
          {usaerMap[alumno.curp] && <div style={{background:"#fdf2f8",border:"1px solid #fbcfe8",borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:12}}><strong>♿ USAER:</strong> {usaerMap[alumno.curp].condicion_usaer}</div>}
          {/* Calificaciones */}
          <table className="tbl" style={{marginBottom:16,fontSize:12}}>
            <thead><tr>
              <th style={{minWidth:150}}>Campo Formativo</th>
              <th style={{textAlign:"center",background:C.p2}}>P1</th>
              <th style={{textAlign:"center",background:C.p2}}>P2</th>
              <th style={{textAlign:"center",background:C.p2}}>P3</th>
              <th style={{textAlign:"center",background:C.p1}}>Prom.</th>
            </tr></thead>
            <tbody>
              {materias.map((m,mi)=>{
                const vs=["1","2","3"].map(p=>{const k=`${grupoFijo}-P${p}`;const d=calificaciones[k]||{};const ef=efCals[k]||{};return !m.tieneEF?(d[alumno.matricula]||{})[mi]:calHumano((d[alumno.matricula]||{})[mi],(ef[alumno.matricula]||{})[mi],m.pctEF);});
                const pr=promedioArr(vs.filter(v=>v!==null&&v!==undefined));
                return (
                  <tr key={mi}>
                    <td style={{fontWeight:600}}>{m.nombre}{m.tieneEF&&<span style={{fontSize:9,color:C.v2,marginLeft:4}}>⚽{m.pctEF}%</span>}</td>
                    {vs.map((v,i)=><td key={i} style={{textAlign:"center",fontWeight:700,color:v===undefined||v===null?C.muted:+v<6?C.d1:+v>=9?C.s1:C.text}}>{v!==undefined&&v!==null?v:"—"}</td>)}
                    <td style={{textAlign:"center",fontWeight:800,background:`${C.p1}11`,color:pr===null?C.muted:pr<6?C.d1:pr>=9?C.s1:C.p1}}>{pr!==null?pr.toFixed(1):"—"}</td>
                  </tr>
                );
              })}
              <tr style={{background:`${C.p1}22`,fontWeight:800}}>
                <td>PROMEDIO GENERAL</td>
                {["1","2","3"].map(p=>{const pr=getProm(alumno.matricula,p);return <td key={p} style={{textAlign:"center",fontSize:13,color:pr===null?C.muted:pr<6?C.d1:pr>=9?C.s1:C.p1}}>{pr!==null?pr.toFixed(1):"—"}</td>;})}
                <td style={{textAlign:"center",fontSize:14,color:C.p1}}>
                  {(()=>{const ps=["1","2","3"].map(p=>getProm(alumno.matricula,p));const pg=promedioArr(ps.filter(v=>v!==null));return pg!==null?pg.toFixed(1):"—";})()}
                </td>
              </tr>
            </tbody>
          </table>
          {/* Firmas */}
          <div style={{display:"flex",justifyContent:"space-around",marginTop:30,textAlign:"center",fontSize:11}}>
            {["Directora","Docente","Padre/Madre/Tutor"].map(f=>(
              <div key={f}>
                <div style={{borderTop:"1.5px solid #000",paddingTop:6,width:160,margin:"0 auto"}}>{f}</div>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}
